name = "vibe-llm-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

# Secrets (do NOT put real values here — set via `wrangler secret put`):
#   UPSTREAM_KEY    = your DeepSeek API key (the real one, stays on the server)
#   ACCESS_TOKEN    = a shared token friends' app sends (rotate/revoke anytime)
# Optional var:
#   UPSTREAM_BASE_URL = https://api.deepseek.com/v1  (default; change for other providers)
