<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="docTitle">CATEGORY DEEP DIVE</title>
<style>
  /* ============ Tokens ============ */
  :root{
    --bg:#faf8f4; --ink:#1c1d20; --ink-2:#3d3e44; --ink-3:#737277; --line:#e3ddcf;
    --mono:'SF Mono','Menlo','Monaco',monospace; --serif:'Iowan Old Style','Cambria',serif;

    /* 3-family palette:
       structure (players/neutral)  → charcoal/slate
       positive  (wins / pos voice) → sage green
       pain      (pains / neg voice)→ rust terracotta */
    --charcoal:#2c2f3a;   --charcoal-2:#4a4e5b;  --charcoal-3:#6b6f7c;
    --sage:#5b7a52;       --sage-2:#7d9970;      --sage-3:#a8bd9e;
    --rust:#a0533c;       --rust-2:#bc7459;      --rust-3:#d4a08e;
    --warm-gray:#80766a;  --warm-gray-2:#a8a094;

    --pos:var(--sage); --neg:var(--rust); --neu:var(--warm-gray); --opp:var(--sage);
    --accent:#a0533c;
    --shadow:0 1px 0 var(--line);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.5}

  /* ============ Header ============ */
  .app-header{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:12px 22px;border-bottom:1px solid var(--line);background:var(--bg);
    position:sticky;top:0;z-index:50;
  }
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--ink-2);text-transform:uppercase}
  .brand b{color:var(--ink);letter-spacing:.05em}
  .view-switcher{display:flex;gap:2px;background:#efe9d9;padding:3px;border-radius:6px}
  .view-switcher button{
    appearance:none;border:0;background:transparent;color:var(--ink-3);
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    padding:5px 11px;border-radius:4px;cursor:pointer;
  }
  body[data-view="graph"] .vs-graph,
  body[data-view="split"] .vs-split,
  body[data-view="lens"]  .vs-lens{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .header-right{justify-self:end;display:flex;gap:14px;align-items:center}
  .verdict-pill{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    padding:5px 12px;border-radius:11px;border:1px solid;
  }
  .verdict-pill{cursor:pointer}
  .verdict-pill[data-status="real"]{color:var(--sage);border-color:var(--sage);background:#f1f6ee}
  .verdict-pill[data-status="partial"]{color:var(--rust);border-color:var(--rust);background:#faf0eb}
  .verdict-pill[data-status="insufficient"]{color:var(--accent);border-color:var(--accent);background:#f7e9e3}

  /* ============ Workbench layout ============ */
  .workbench{display:flex;height:calc(100vh - 49px);overflow:hidden}
  .center-panel,.lens-panel{transition:width .32s ease, opacity .25s ease;overflow:hidden}
  body[data-view="graph"] .center-panel{width:100%}
  body[data-view="graph"] .lens-panel{width:0;opacity:0;pointer-events:none}
  body[data-view="split"] .center-panel{width:50%;border-right:1px solid var(--line)}
  body[data-view="split"] .lens-panel{width:50%}
  body[data-view="lens"]  .center-panel{width:0;opacity:0;pointer-events:none}
  body[data-view="lens"]  .lens-panel{width:100%}

  /* ============ Center panel (Always-On graph) ============ */
  .center-panel{position:relative;background:radial-gradient(ellipse at 50% 45%,#fdfbf5 0%,#f3eedf 90%);overflow:hidden;cursor:grab}
  .center-panel.is-panning{cursor:grabbing}
  /* ---- Demand-signal radar ---- */
  .radar-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .radar-hud{position:absolute;top:34px;left:18px;z-index:6;font-size:11px;color:#6b6f7c;
    line-height:1.7;letter-spacing:.3px;pointer-events:none;font-variant-numeric:tabular-nums}
  .radar-hud b{color:#5b7a52;font-weight:700}
  .radar-controls{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:7;
    display:flex;gap:9px}
  .radar-btn{background:rgba(91,122,82,.10);border:1px solid #5b7a52;color:#4a6043;
    padding:7px 15px;border-radius:20px;font-size:12px;cursor:pointer;letter-spacing:.3px;
    transition:.16s;font-family:inherit}
  .radar-btn:hover{background:rgba(91,122,82,.22);box-shadow:0 0 14px rgba(91,122,82,.25)}
  .radar-btn:active{transform:scale(.96)}
  .radar-btn.ghost{border-color:#cdc8b8;color:#8a8678;background:rgba(0,0,0,.02)}
  .radar-scanmsg{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);z-index:7;
    font-size:11.5px;color:#5b7a52;letter-spacing:.5px;opacity:0;transition:.35s;pointer-events:none;
    background:rgba(253,251,245,.85);padding:3px 10px;border-radius:12px}
  .radar-scanmsg.show{opacity:1}
  .radar-scanmsg b{font-weight:700}
  /* ---- detailed-report insight visuals ---- */
  .ins-mode{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;
    color:#fff;background:#4a4e5b;padding:3px 10px;border-radius:11px;margin-bottom:10px}
  .ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;margin:12px 0 6px}
  .ins-card{border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:#fff}
  .ins-card h4{margin:0 0 11px;font-size:11px;letter-spacing:.05em;color:var(--ink-3);
    text-transform:uppercase;font-family:var(--mono)}
  .ins-stat-row{display:flex;gap:22px;margin:0 0 13px}
  .ins-stat b{display:block;font-size:21px;font-family:var(--serif);color:var(--ink);line-height:1.1}
  .ins-stat span{font-size:11px;color:var(--ink-3)}
  .ins-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .ins-bar .seg{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;
    font-family:var(--mono);min-width:42px;white-space:nowrap}
  .ins-bar .seg.pos{background:#7d9970}.ins-bar .seg.neg{background:#bc7459}
  .ins-trow{display:grid;grid-template-columns:104px 1fr 26px;align-items:center;gap:10px;margin:7px 0}
  .ins-tlabel{font-size:12.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ins-tbar{height:9px;background:#f0ebdd;border-radius:5px;overflow:hidden}
  .ins-tbar i{display:block;height:100%}
  .ins-tbar i.pos{background:#7d9970}.ins-tbar i.neg{background:#bc7459}.ins-tbar i.neu{background:#b6ac9a}
  .ins-tcount{font-size:11px;color:var(--ink-3);text-align:right;font-variant-numeric:tabular-nums}
  .ins-quotes{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
  .ins-qcol h4{display:flex;align-items:center;gap:7px;margin:0 0 4px;font-size:12.5px;color:var(--ink)}
  .ins-qcol .qdot{width:9px;height:9px;border-radius:50%;flex:none}
  .ins-qcol.pos .qdot{background:#7d9970}.ins-qcol.neg .qdot{background:#bc7459}
  .ins-q{border-left:2px solid var(--line);padding:4px 0 4px 11px;margin:9px 0;font-size:13px;
    line-height:1.55;color:var(--ink-2)}
  .ins-q.pos{border-left-color:#7d9970}.ins-q.neg{border-left-color:#bc7459}
  .ins-q .qsrc{display:block;margin-top:3px;font-size:11px;color:var(--ink-3);font-family:var(--mono)}
  @media(max-width:720px){.ins-grid,.ins-quotes{grid-template-columns:1fr}}
  /* subtle Chinese translation under an English voice (zh mode only) */
  .v-zh{font-size:11px;color:var(--ink-3);line-height:1.4;margin-top:1px;opacity:.85}
  /* user & demand decomposition */
  .ud-jtbd{background:rgba(91,122,82,.08);border:1px solid rgba(91,122,82,.28);border-radius:9px;
    padding:11px 14px;margin:8px 0 4px;font-size:14px;line-height:1.55;color:var(--ink)}
  .ud-jtbd .ud-jtbd-lbl{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;
    color:#4a6043;background:rgba(91,122,82,.16);padding:2px 8px;border-radius:9px;margin-right:8px}
  .ud-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 4px}
  @media(max-width:720px){.ud-grid{grid-template-columns:1fr}}
  .ud-card{border:1px solid var(--line);border-left:3px solid #80766a;border-radius:8px;padding:10px 13px;background:#fff}
  .ud-card.sc{border-left-color:#5b7a52}.ud-card.pe{border-left-color:#4a4e5b}
  .ud-card.un{border-left-color:#bc7459}.ud-card.wa{border-left-color:#c9a14a}
  .ud-card .ud-name{font-weight:600;font-size:13.5px;color:var(--ink);margin-bottom:3px}
  .ud-card .ud-sum{font-size:12.5px;line-height:1.55;color:var(--ink-2)}
  .ev-link{text-decoration:none;color:#5b7a52;font-size:12px;margin-left:3px}
  .ev-link:hover{color:#3f5a39}
  /* advisory entry directions */
  .fb-path.adv .fp-row{font-size:13px;line-height:1.55;color:var(--ink-2);margin:6px 0}
  .fb-path.adv .fp-row b{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:#4a6043;
    background:rgba(91,122,82,.12);padding:1px 7px;border-radius:8px;margin-right:7px;text-transform:uppercase}
  .fb-path.adv .fp-row.risk b{color:#8a6d1e;background:rgba(201,161,74,.16)}
  .fb-path.adv .fp-oq{margin:5px 0 0 0;padding-left:18px}
  .fb-path.adv .fp-oq li{font-size:12.5px;line-height:1.5;color:var(--ink-2);margin:2px 0}
  /* demand map / opportunity matrix */
  .dm-chart{display:block;width:100%;height:400px;margin:10px 0 2px}
  /* usage-scenario share bars */
  .sc-list{margin:8px 0 2px}
  .sc-row{display:grid;grid-template-columns:140px 1fr 40px;align-items:center;gap:6px 14px;padding:9px 0;border-bottom:1px solid #efe9da}
  .sc-row:last-child{border-bottom:0}
  .sc-name{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc-bar{height:10px;background:#f0ebdd;border-radius:5px;overflow:hidden}
  .sc-bar i{display:block;height:100%;background:linear-gradient(90deg,#7d9970,#5b7a52);border-radius:5px}
  .sc-pct{font-size:12px;color:var(--ink-3);text-align:right;font-variant-numeric:tabular-nums}
  .sc-sum{grid-column:1 / -1;font-size:12.5px;line-height:1.5;color:var(--ink-3);margin:-3px 0 0}
  /* persona chips */
  .pchip-row{display:flex;flex-wrap:wrap;gap:9px;margin:8px 0 2px}
  .pchip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:20px;
    padding:7px 14px;background:#fff;font-size:13px;color:var(--ink);cursor:default;
    box-shadow:0 1px 2px rgba(40,35,20,.04)}
  .pchip:hover{border-color:var(--charcoal-3)}
  .pchip-dot{width:9px;height:9px;border-radius:50%;background:#4a4e5b;flex:none}
  .pchip-pct{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  /* ---- aesthetic polish: softer cards + lighter read-notes + rhythm ---- */
  .ins-card,.ud-card{border-color:#ece4d3;box-shadow:0 1px 3px rgba(40,35,20,.045)}
  .ins-card{padding:16px 18px}
  .read-note{font-style:italic;color:var(--ink-3);opacity:.92;border-left-color:#e2dac8}
  .fb-body h3{margin:24px 0 8px}
  .fb-body h2 + .sec-summary{margin-top:8px}
  .sec-summary{max-width:720px}
  /* sticky one-click report nav (TOC) */
  .fb-nav{position:sticky;top:49px;z-index:20;display:flex;align-items:center;gap:12px;
    margin:0 0 18px;padding:9px 0;background:rgba(251,248,238,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .fb-nav .fbn-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-3);white-space:nowrap;flex:none}
  .fb-nav .fbn-links{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  .fb-nav .fbn-links::-webkit-scrollbar{display:none}
  .fbn-link{white-space:nowrap;font-size:12px;color:var(--ink-2);text-decoration:none;padding:5px 11px;
    border-radius:16px;transition:background .15s,color .15s}
  .fbn-link:hover{background:rgba(91,122,82,.1);color:var(--ink)}
  .fbn-link.active{background:#5b7a52;color:#fff}
  @media print{.fb-nav{display:none}}
  /* ---- professional report modules (borrowed contract: R2/R4/R5) ---- */
  .read-note{font-size:11px;color:var(--ink-3);line-height:1.55;margin:8px 0 2px;
    padding-left:10px;border-left:2px solid var(--line)}
  .read-note b{color:var(--ink-2);font-weight:600}
  .kicker{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-bottom:9px}
  .kicker.measured{background:rgba(91,122,82,.13);color:#4a6043}
  .kicker.judgment{background:rgba(201,161,74,.18);color:#8a6d1e}
  .secnum + .kicker, h2 .kicker{margin-left:8px;vertical-align:middle}
  /* brand comparison table */
  .bt{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
  .bt th{text-align:left;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-3);padding:7px 10px;border-bottom:1px solid var(--line)}
  .bt td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .bt tr:hover td{background:rgba(0,0,0,.02)}
  .bt .bt-name{font-weight:600;color:var(--ink)}
  .bt .bt-link{font-size:10.5px;color:var(--ink-3);text-decoration:none;border-bottom:1px dotted var(--ink-3)}
  .bt .bt-link:hover{color:#5b7a52;border-color:#5b7a52}
  .bt-mini{display:inline-flex;height:8px;width:96px;border-radius:4px;overflow:hidden;
    border:1px solid var(--line);vertical-align:middle}
  .bt-mini i{display:block;height:100%}.bt-mini i.pos{background:#7d9970}.bt-mini i.neg{background:#bc7459}
  .bt-num{font-variant-numeric:tabular-nums;color:var(--ink-2)}
  .bt-sent{margin-left:8px;font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .bt-sent .p{color:#5f7a52}.bt-sent .n{color:#b06343}
  /* theme × sentiment heatmap (full report width, label column flexes) */
  .hm{width:100%;border-collapse:separate;border-spacing:6px;font-size:12px;margin:10px 0;table-layout:fixed}
  .hm th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--ink-3);
    text-transform:uppercase;padding:4px 10px 8px;text-align:center;width:120px}
  .hm th:first-child{width:auto}
  .hm td.hm-th{width:auto;text-align:left;color:var(--ink);padding:6px 18px 6px 2px;font-size:13.5px;white-space:nowrap;font-weight:500}
  .hm td.cell{width:120px;height:40px;text-align:center;color:#fff;font-variant-numeric:tabular-nums;
    font-size:12.5px;border-radius:6px;font-weight:600}
  /* quote wall */
  .qw{columns:2;column-gap:16px;margin:10px 0 2px}
  @media(max-width:720px){.qw{columns:1}}
  .qw .tile{break-inside:avoid;border:1px solid var(--line);border-left:3px solid #7d9970;
    border-radius:8px;padding:10px 12px;margin:0 0 12px;font-size:13px;line-height:1.5;background:#fff;color:var(--ink-2)}
  .qw .tile.neg{border-left-color:#bc7459}
  .qw .tile .qw-src{display:block;margin-top:6px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
  .qw .tile .qw-src a{color:var(--ink-3)}
  /* discussion-trend line chart (full report width) */
  .trend-chart{display:block;width:100%;height:150px;margin:8px 0 2px;overflow:visible}
  /* methodology footer */
  .meth{border-top:1px solid var(--line);margin-top:14px;padding-top:14px;font-size:12.5px;
    color:var(--ink-2);line-height:1.7}
  .meth .meth-src{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:8px;word-break:break-word}
  .meth .meth-gaps{background:rgba(201,161,74,.08);border:1px solid rgba(201,161,74,.3);
    border-radius:8px;padding:10px 13px;margin-top:10px;font-size:12px;color:#6b5418;line-height:1.6}
  .kg-zoom-controls{
    position:absolute;top:46px;left:18px;display:flex;flex-direction:column;gap:1px;z-index:6;
    background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:5px;overflow:hidden;backdrop-filter:blur(4px);
  }
  .kg-zoom-controls button{
    appearance:none;border:0;background:transparent;width:28px;height:26px;cursor:pointer;
    font-family:var(--mono);font-size:13px;color:var(--ink-2);line-height:1;
  }
  .kg-zoom-controls button:hover{background:rgba(0,0,0,.05);color:var(--ink)}
  .kg-zoom-controls button + button{border-top:1px solid var(--line)}
  .zoom-level{
    position:absolute;top:46px;left:54px;
    font-family:var(--mono);font-size:10px;color:var(--ink-3);
    background:rgba(255,255,255,.7);padding:3px 7px;border-radius:3px;backdrop-filter:blur(4px);
  }
  .evidence-counter{
    position:absolute;top:16px;left:18px;right:18px;z-index:5;
    display:flex;gap:20px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.04em;
  }
  .evidence-counter b{color:var(--ink);font-weight:600;margin-right:3px}
  .center-hint{
    position:absolute;bottom:16px;left:18px;font-family:var(--mono);font-size:10.5px;
    color:var(--ink-3);letter-spacing:.04em;background:rgba(255,255,255,.6);padding:5px 10px;border-radius:4px;
    backdrop-filter:blur(4px);
  }
  .legend{
    position:absolute;bottom:16px;right:18px;font-family:var(--mono);font-size:10px;color:var(--ink-3);
    background:rgba(255,255,255,.6);padding:8px 11px;border-radius:4px;backdrop-filter:blur(4px);
    line-height:1.7;
  }
  .legend .lg-row{display:flex;align-items:center;gap:6px}
  .legend .lg-dot{display:inline-block;width:8px;height:8px;border-radius:50%}
  .kg-svg{width:100%;height:100%;display:block}
  .kg-svg .node{cursor:pointer;transition:opacity .35s ease}
  .kg-svg .node circle{transition:stroke-width .25s ease}
  .kg-svg .node text{
    font-family:var(--mono);font-size:11.5px;fill:var(--ink-2);
    pointer-events:none;text-anchor:middle;letter-spacing:.02em;
  }
  .kg-svg .node-player text{font-size:12.5px;fill:var(--ink);font-weight:500}
  .kg-svg .edge{stroke:#bfb59c;stroke-opacity:.4;transition:stroke-opacity .3s ease, stroke-width .3s ease;fill:none}
  body[data-selected-id] .kg-svg .node{opacity:.14}
  body[data-selected-id] .kg-svg .node.is-selected{opacity:1}
  body[data-selected-id] .kg-svg .node.is-neighbor{opacity:.9}
  body[data-selected-id] .kg-svg .edge{stroke-opacity:.06}
  body[data-selected-id] .kg-svg .edge.is-incident{stroke-opacity:.78;stroke-width:1.6}
  .kg-svg .node.is-selected circle.core{stroke:#000;stroke-width:2.4}

  /* Voice nodes always visible but visually subordinate. They brighten when
     their player/theme is hovered or selected. */
  .kg-svg .node-voice{transition:opacity .25s ease}
  .kg-svg .node-voice circle.core{opacity:.7}
  body .kg-svg .node-voice.is-related circle.core{opacity:1}
  body .kg-svg .node-voice.is-hover circle.core{opacity:1}
  /* During selection-dim mode, non-related voices fade further but stay
     faintly visible (so user knows they exist) */
  body[data-selected-id] .kg-svg .node-voice:not(.is-related):not(.is-selected){opacity:.3}

  /* Hover state (visual feedback BEFORE click) */
  .kg-svg .node.is-hover circle.core{stroke:#000;stroke-width:1.8}
  .kg-svg .node.is-hover-neighbor{opacity:.9 !important}
  .kg-svg .edge.is-hover-incident{stroke-opacity:.65;stroke-width:1.5}

  /* Floating tooltip */
  .kg-tooltip{
    position:absolute;pointer-events:none;z-index:20;
    background:rgba(23,23,23,.94);color:#f5f1e7;
    font-family:var(--mono);font-size:11px;letter-spacing:.02em;
    padding:8px 11px;border-radius:5px;max-width:280px;line-height:1.5;
    opacity:0;transition:opacity .12s ease;transform:translate(-50%,calc(-100% - 14px));
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .kg-tooltip.show{opacity:1}
  .kg-tooltip .tt-title{color:#fff;font-family:var(--serif);font-size:13.5px;letter-spacing:0;margin-bottom:3px}
  .kg-tooltip .tt-meta{color:#a8a39a;font-size:10.5px}
  .kg-tooltip .tt-score{color:#fbbf24;font-weight:600;margin-left:6px}
  .kg-tooltip .tt-hint{color:#a8a39a;font-size:10px;margin-top:6px;padding-top:5px;border-top:1px solid #3a3a3a}

  /* Voice freshness ring */
  .kg-svg .node-voice .ring{
    fill:none;stroke:currentColor;stroke-opacity:.32;
    transform-origin:center;transform-box:fill-box;
    animation:freshPulse 2.6s ease-in-out infinite;
  }
  .kg-svg .node-voice .ring.delayed{animation-delay:.4s}
  .kg-svg .node-voice .ring.delayed2{animation-delay:.9s}
  @keyframes freshPulse{
    0%  {stroke-opacity:.36; transform:scale(1);}
    70% {stroke-opacity:0;    transform:scale(1.9);}
    100%{stroke-opacity:0;    transform:scale(1.9);}
  }

  /* Stagger fade-in on load (opacity-only — CSS transform would override SVG transform attr) */
  .kg-svg .node{opacity:0; animation:nodeFadeIn .55s ease forwards}
  .kg-svg .edge{opacity:0; animation:edgeFadeIn .5s ease forwards}
  body[data-selected-id] .kg-svg .node{animation:none; opacity:1}
  body[data-selected-id] .kg-svg .edge{animation:none; opacity:1}
  @keyframes nodeFadeIn{
    from{opacity:0}
    to  {opacity:var(--target-op,1)}
  }
  @keyframes edgeFadeIn{from{opacity:0}to{opacity:1}}

  /* Opportunity node ring (subtle constant pulse) */
  .kg-svg .node-opportunity circle.core{
    animation:oppPulse 3.5s ease-in-out infinite;transform-origin:center;transform-box:fill-box;
  }
  @keyframes oppPulse{
    0%,100%{stroke-opacity:.85}
    50%{stroke-opacity:.4}
  }

  /* ============ Lens panel ============ */
  .lens-panel{display:flex;flex-direction:column;background:var(--bg)}
  .lens-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);padding:0 18px;background:#fbf8ee}
  .lens-tabs button{
    appearance:none;border:0;background:transparent;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    padding:13px 14px;cursor:pointer;color:var(--ink-3);border-bottom:2px solid transparent;
    text-transform:uppercase;
  }
  .lens-tabs button.active{color:var(--ink);border-bottom-color:var(--ink)}
  .lens-body{flex:1;overflow:auto;padding:24px 28px}
  .lens-view{display:none}
  body[data-lens="overview"]    .lens-view[data-lens-id="overview"]   ,
  body[data-lens="voices"]      .lens-view[data-lens-id="voices"]     ,
  body[data-lens="players"]     .lens-view[data-lens-id="players"]    ,
  body[data-lens="opportunity"] .lens-view[data-lens-id="opportunity"],
  body[data-lens="strategy"]    .lens-view[data-lens-id="strategy"]   ,
  body[data-lens="risks"]       .lens-view[data-lens-id="risks"]      {display:block}

  /* lens content typography */
  .lens-body h3{font-family:var(--serif);font-size:22px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .lens-body h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--ink-3);text-transform:uppercase;margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .lens-body p{margin:0 0 10px;color:var(--ink-2)}
  .pc-meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);margin-bottom:6px}
  .pc-summary{font-style:italic;color:var(--ink-2);font-family:var(--serif);font-size:14.5px}

  /* overview specifics */
  .verdict-card{border:1px solid var(--line);background:#fff;padding:18px 20px;border-radius:6px;margin-bottom:18px}
  .verdict-card .v-title{font-family:var(--serif);font-size:24px;line-height:1.3;margin:8px 0 14px}
  .verdict-card .v-counts{display:flex;gap:24px;font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .verdict-card .v-counts b{font-size:18px;color:var(--ink);font-family:var(--serif);font-weight:600;display:block}
  .kf{list-style:none;padding:0;margin:0;counter-reset:kf}
  .kf li{counter-increment:kf;padding:10px 0 10px 32px;position:relative;border-bottom:1px dashed var(--line)}
  .kf li::before{content:counter(kf,decimal-leading-zero);position:absolute;left:0;top:11px;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.1em}
  .kf li:last-child{border-bottom:0}
  .kf b{color:var(--ink)}

  /* player chips */
  .player-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .player-chips .chip{
    appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink-3);
    font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:4px;cursor:pointer;
  }
  body[data-selected-id="oura"]       .chip[data-player-id="oura"]      ,
  body[data-selected-id="samsung"]    .chip[data-player-id="samsung"]   ,
  body[data-selected-id="ringconn"]   .chip[data-player-id="ringconn"]  ,
  body[data-selected-id="ultrahuman"] .chip[data-player-id="ultrahuman"],
  body[data-selected-id="apple"]      .chip[data-player-id="apple"]     {background:var(--ink);color:#fff;border-color:var(--ink)}

  /* player cards */
  .player-card{border:1px solid var(--line);background:#fff;border-radius:6px;padding:18px 20px;margin-bottom:14px}
  body[data-lens="players"][data-selected-id] .player-card{display:none}
  body[data-selected-id="oura"]       .player-card[data-player-id="oura"]      ,
  body[data-selected-id="samsung"]    .player-card[data-player-id="samsung"]   ,
  body[data-selected-id="ringconn"]   .player-card[data-player-id="ringconn"]  ,
  body[data-selected-id="ultrahuman"] .player-card[data-player-id="ultrahuman"],
  body[data-selected-id="apple"]      .player-card[data-player-id="apple"]     {display:block}

  /* voice rows */
  .voice-row{display:grid;grid-template-columns:18px 1fr auto;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:start;font-size:13.5px}
  .voice-row:last-child{border-bottom:0}
  .voice-row .dot{font-size:10px;line-height:18px}
  .voice-row.pos .dot{color:var(--pos)}
  .voice-row.neg .dot{color:var(--neg)}
  .voice-row .vt{color:var(--ink)}
  .voice-row .vm{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:2px}
  .voice-row .vs{font-family:var(--mono);font-size:11px;color:var(--ink-3);white-space:nowrap;padding-top:1px}
  .voice-row a{color:inherit;text-decoration:none;border-bottom:1px solid #d6cdb4}
  .voice-row a:hover{border-bottom-color:var(--ink)}

  /* voices lens filter */
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .filter-bar .fb-lbl{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-right:4px}
  .filter-bar .chip{
    appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink-3);
    font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;
  }
  .filter-bar .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .voice-row.fb-hidden{display:none}

  /* opp / strategy / risks placeholders */
  .placeholder-block{border:1px dashed var(--line);background:#fff;padding:24px;border-radius:6px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:12px}
  .opp-card{border:2px dashed var(--opp);background:#f0fdf4;padding:22px;border-radius:6px;margin-bottom:14px}
  .opp-card h3{color:var(--opp)}
  .strategy-card{border:1px solid var(--line);background:#fff;border-radius:6px;padding:18px 20px;margin-bottom:14px}
  .strategy-card.rec{border-color:var(--pos);background:#f7fdf7}
  .strategy-card h4{margin-top:0;border:0;padding:0;color:var(--ink);font-family:var(--serif);font-size:16px;text-transform:none;letter-spacing:0}
  .risk-row{display:grid;grid-template-columns:46px 1fr auto;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .risk-row .rid{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .risk-row .sev{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:3px;align-self:start}
  .sev.hi{background:#fef2f2;color:var(--accent)}
  .sev.md{background:#fff7ed;color:var(--neg)}
  .sev.lo{background:#f3f4f6;color:var(--ink-3)}

  /* fallback — always visible, scroll down to read */
  .report-fallback{border-top:1px solid var(--line);background:#fbf8ee;padding:0 22px 8px}
  .fb-body{display:block;padding:24px 0 56px;text-align:left;color:var(--ink);max-width:820px;margin:0 auto}
  .fb-body h1{font-family:var(--serif);font-size:26px;font-weight:600;margin:0 0 6px;letter-spacing:-.01em}
  .fb-body .fb-deck{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-2);margin-bottom:24px}
  .fb-body h2{font-family:var(--serif);font-size:25px;font-weight:600;letter-spacing:-.01em;color:var(--ink);
    margin:46px 0 4px;border-top:2px solid var(--ink);padding-top:16px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .fb-body h2 .secnum{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--charcoal-3);font-weight:400}
  .fb-body h2 .fb-icon{width:18px;height:18px;color:var(--ink-3);align-self:center}
  .sec-summary{font-family:var(--serif);font-size:15px;font-style:italic;line-height:1.6;color:var(--ink-2);
    margin:2px 0 16px;max-width:760px}
  .fb-body h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:22px 0 6px;color:var(--ink)}
  .fb-body p{font-family:var(--serif);font-size:14.5px;line-height:1.65;color:var(--ink-2);margin:6px 0 10px}
  .fb-body ul{font-family:var(--serif);font-size:14.5px;line-height:1.65;color:var(--ink-2);margin:6px 0 14px;padding-left:22px}
  .fb-body ul li{margin-bottom:4px}
  .fb-body .fb-table{width:100%;border-collapse:collapse;margin:14px 0;font-family:var(--mono);font-size:11.5px}
  .fb-body .fb-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--ink);font-weight:600;color:var(--ink);letter-spacing:.05em;text-transform:uppercase;font-size:10.5px}
  .fb-body .fb-table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink-2)}
  .fb-body .fb-table tr:last-child td{border-bottom:0}
  .fb-body .fb-quote{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink);border-left:2px solid var(--sage);padding:2px 0 2px 14px;margin:14px 0}
  .fb-body .fb-quote.neg{border-left-color:var(--rust)}
  .fb-body .fb-quote .src{display:block;font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:5px;letter-spacing:.04em}
  .fb-body .fb-verdict{background:#f1f6ee;border-left:3px solid var(--sage);padding:14px 16px;margin:14px 0 22px;font-family:var(--serif);font-size:15px}
  .fb-body .fb-verdict b{color:var(--sage);font-weight:600}
  .fb-body .pos{color:var(--sage);font-weight:600}
  .fb-body .neg{color:var(--rust);font-weight:600}
  .fb-body .neu{color:var(--warm-gray);font-weight:600}
  .fb-body .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}

  /* selection indicator strip */
  .selection-strip{
    font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.06em;
    padding:4px 0 12px;display:none;
  }
  body[data-selected-id] .selection-strip{display:block}
  .selection-strip b{color:var(--ink);font-weight:600}
  .selection-strip .clear{margin-left:10px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--accent)}

  /* ============ MOBILE / ≤999px ============
     Below 1000px, abandon the side-by-side workbench:
     - Top header collapses (brand truncates, view-switcher drops)
     - Workbench becomes vertical: graph on top (40vh), lens below
     - Lens tabs become horizontally scrollable
     - Player chips wrap
     - Touch-friendly tap targets (min 44px)
     - Tooltip auto-hides faster
  */
  @media (max-width: 999px) {
    .app-header {
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px 14px;
    }
    .brand { font-size: 9.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .view-switcher { display: none }  /* mobile uses tap-tab nav, not split modes */
    .header-right { gap: 8px }
    .verdict-pill { font-size: 9.5px; padding: 4px 9px }

    .workbench {
      flex-direction: column;
      height: calc(100vh - 47px);
    }
    /* Graph: top 38vh; lens: rest. Always-on, no view switcher. */
    .center-panel, .lens-panel {
      width: 100% !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      transition: none !important;
    }
    .center-panel { height: 38vh; min-height: 280px; border-right: 0 !important; border-bottom: 1px solid var(--line) }
    .lens-panel { flex: 1; min-height: 0 }

    /* Smaller overlay strips */
    .evidence-counter { gap: 10px; font-size: 9.5px; top: 8px; left: 10px; right: 10px }
    .center-hint { font-size: 9px; bottom: 8px; left: 10px; padding: 4px 8px }
    .legend { font-size: 9px; bottom: 8px; right: 10px; padding: 6px 9px; line-height: 1.5 }
    .kg-zoom-controls { top: 30px; left: 10px }
    .kg-zoom-controls button { width: 34px; height: 34px; font-size: 14px }
    .zoom-level { top: 30px; left: 50px; font-size: 9.5px }

    /* Lens tabs horizontal scroll */
    .lens-tabs {
      padding: 0 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .lens-tabs::-webkit-scrollbar { display: none }
    .lens-tabs button {
      padding: 11px 14px;
      font-size: 11.5px;
      flex-shrink: 0;
      min-height: 44px;
    }
    .lens-body { padding: 16px 16px 24px }

    /* Player chips wrap nicer + tap targets */
    .player-chips .chip { padding: 9px 13px; font-size: 12px; min-height: 38px }
    .lens-body h3 { font-size: 19px }
    .v-title { font-size: 18px }

    /* Tooltip: tighter for finger-driven nav */
    .kg-tooltip { font-size: 10.5px; max-width: 220px; padding: 7px 9px }

    /* Print button: smaller, less obtrusive */
    .print-btn { bottom: 12px; right: 12px; padding: 7px 11px; font-size: 10px }

    /* Fallback: tighter padding */
    .report-fallback { padding: 12px 14px }
    .fb-body { padding: 18px 0 30px }
    .fb-body h1 { font-size: 22px }
    .fb-body h2 { font-size: 10px }
    .fb-body .fb-table { font-size: 10.5px }
    .fb-body .fb-table th, .fb-body .fb-table td { padding: 6px 7px }
  }

  /* ============ PRINT / PDF ============ */
  @page {
    size: A4;
    margin: 16mm 14mm 18mm 14mm;
  }
  @media print{
    /* Hide interactive UI */
    .app-header, .workbench, .report-fallback button { display: none !important; }
    /* Force fallback open */
    .report-fallback { border: 0 !important; background: transparent !important; padding: 0 !important; }
    .report-fallback .fb-body { display: block !important; padding: 0 !important; max-width: none !important; margin: 0 !important; }

    /* Black on white for printer */
    html, body { background: #fff !important; color: #000 !important; }
    .fb-body, .fb-body * {
      font-family: var(--serif), Georgia, serif !important;
      color: #000 !important;
    }
    /* Restore semantic colors for verdict box, quotes */
    .fb-body .fb-verdict { background: #f5f1e7 !important; border-left: 3px solid #000 !important; }
    .fb-body .fb-quote { border-left: 2px solid #000 !important; }
    .fb-body .pos { color: #2d5a3d !important; }
    .fb-body .neg { color: #8b3f25 !important; }

    /* Page-break control */
    .fb-body h1 { margin-top: 0; }
    .fb-body h2 { page-break-before: always; page-break-after: avoid; }
    .fb-body h2:first-of-type { page-break-before: avoid; }
    .fb-body h3 { page-break-after: avoid; }
    .fb-body table, .fb-body .fb-quote, .fb-body .fb-verdict,
    .fb-body ul, .fb-body ol { page-break-inside: avoid; }
    .fb-body img, .fb-body svg { page-break-inside: avoid; }

    /* Table contrast for B&W print */
    .fb-body .fb-table th { border-bottom: 2px solid #000 !important; }
    .fb-body .fb-table td { border-bottom: 1px solid #999 !important; }

    /* Links: show URL inline (so printout has citation) */
    .fb-body a[href^="http"]::after {
      content: " (" attr(href) ")";
      font-size: 9pt;
      color: #555 !important;
      font-style: italic;
    }

    /* Page footer via running element */
    .fb-body { counter-reset: page-counter; }
  }
  /* Always-on print helper button (visible on screen, hidden in print) */
  .print-btn {
    position: fixed; bottom: 18px; right: 18px; z-index: 60;
    appearance: none; border: 1px solid var(--line); background: rgba(255,255,255,.85);
    backdrop-filter: blur(4px);
    font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
    color: var(--ink-2); padding: 8px 14px; border-radius: 5px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(28,29,32,.06);
  }
  .print-btn:hover { color: var(--ink); border-color: var(--charcoal-3); }
  @media print { .print-btn { display: none !important; } }

  /* ============ Header buttons (lang + download) ============ */
  .dl-btn {
    appearance:none; border:1px solid var(--line); background:#fff; cursor:pointer;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; color:var(--ink-2);
    padding:5px 10px; border-radius:5px;
  }
  .dl-btn:hover { border-color:var(--charcoal-3); color:var(--ink); }
  .dl-btn { white-space:nowrap; }
  /* CN | EN sliding switch */
  .lang-switch {
    position:relative; display:inline-flex; align-items:center; padding:2px; height:24px;
    border:1px solid var(--line); background:#fff; border-radius:999px; cursor:pointer;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; appearance:none;
  }
  .lang-switch .ls-opt { position:relative; z-index:1; width:30px; text-align:center;
    line-height:20px; color:var(--ink-3); transition:color .2s; }
  .lang-switch .ls-thumb { position:absolute; z-index:0; top:2px; left:2px; width:30px; height:20px;
    border-radius:999px; background:#5b7a52; transition:transform .22s cubic-bezier(.4,0,.2,1); }
  body[data-lang="en"] .lang-switch .ls-thumb { transform:translateX(30px); }
  body[data-lang="zh"] .lang-switch .ls-opt[data-l="zh"],
  body[data-lang="en"] .lang-switch .ls-opt[data-l="en"] { color:#fff; }
  .lang-switch:hover { border-color:var(--charcoal-3); }
  @media print { .lang-switch, .dl-btn { display:none !important; } }

  /* ============ Filter bar v2 — tidy wrapped groups ============ */
  .filter-bar { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; align-items:stretch; }
  .fb-group { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .fb-group .fb-lbl {
    font-family:var(--mono); font-size:9.5px; color:var(--ink-3); letter-spacing:.12em;
    text-transform:uppercase; width:42px; flex-shrink:0;
  }

  /* ============ Always-visible fallback report ============ */
  .report-divider {
    border-top:1px solid var(--line); background:#fbf8ee; text-align:center;
    padding:18px; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em;
    color:var(--ink-3); text-transform:uppercase;
  }
  .report-divider .rd-arrow { display:block; margin-top:4px; font-size:14px; opacity:.5; }

  /* ============ Report visualization (icons, badges, bars) ============ */
  .fb-body .fb-icon { width:15px; height:15px; vertical-align:-2px; margin-right:7px; stroke:var(--charcoal-2); }
  .fb-verdict-viz {
    display:flex; gap:0; margin:16px 0 26px; border:1px solid var(--line); border-radius:8px; overflow:hidden;
  }
  .fb-verdict-viz .vv-status {
    flex:0 0 auto; padding:18px 22px; display:flex; flex-direction:column; gap:4px;
    justify-content:center; align-items:center; border-right:1px solid var(--line); min-width:120px;
  }
  .fb-verdict-viz .vv-status .vv-icon { font-size:26px; line-height:1; }
  .fb-verdict-viz .vv-status .vv-label { font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
  .fb-verdict-viz[data-status="real"]  .vv-status { background:#f1f6ee; color:var(--sage); }
  .fb-verdict-viz[data-status="partial"] .vv-status { background:#faf0eb; color:var(--rust); }
  .fb-verdict-viz[data-status="insufficient"] .vv-status { background:#f7e9e3; color:var(--accent); }
  .fb-verdict-viz .vv-body { flex:1; padding:16px 20px; display:flex; flex-direction:column; justify-content:center; }
  .fb-verdict-viz .vv-rationale { font-family:var(--serif); font-size:14px; color:var(--ink); margin-bottom:10px; line-height:1.5; }
  .fb-counts-row { display:flex; gap:0; }
  .fb-counts-row .fc { flex:1; text-align:center; padding:2px 4px; border-left:1px solid var(--line); }
  .fb-counts-row .fc:first-child { border-left:0; }
  .fb-counts-row .fc b { display:block; font-family:var(--serif); font-size:20px; color:var(--ink); font-weight:600; }
  .fb-counts-row .fc span { font-family:var(--mono); font-size:9px; color:var(--ink-3); letter-spacing:.04em; text-transform:uppercase; }

  /* key findings as icon cards */
  .fb-findings { display:grid; grid-template-columns:1fr; gap:8px; margin:10px 0 8px; }
  .fb-finding { display:flex; gap:12px; align-items:flex-start; padding:12px 14px; border:1px solid var(--line); border-radius:7px; background:#fff; }
  .fb-finding .ff-num { font-family:var(--mono); font-size:11px; color:#fff; background:var(--charcoal); width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .fb-finding p { margin:0; font-size:13.5px; line-height:1.55; }

  /* player mini-cards grid */
  .fb-player-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin:12px 0; }
  .fb-player-card { border:1px solid var(--line); border-radius:7px; padding:12px 14px; background:#fff; }
  .fb-player-card .pcc-name { font-family:var(--serif); font-size:15px; font-weight:600; margin-bottom:3px; }
  .fb-player-card .pcc-meta { font-family:var(--mono); font-size:10px; color:var(--ink-3); margin-bottom:6px; }
  .fb-player-card .pcc-status { display:inline-block; font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:9px; letter-spacing:.04em; text-transform:uppercase; }
  .pcc-status.live { background:#f1f6ee; color:var(--sage); }
  .pcc-status.rumored { background:#f7e9e3; color:var(--accent); }
  .pcc-status.stagnant, .pcc-status.dead { background:#f3f1ec; color:var(--warm-gray); }

  /* risk rows with severity bar */
  .fb-risk { display:grid; grid-template-columns:54px 1fr 80px; gap:12px; align-items:center; padding:11px 0; border-bottom:1px dashed var(--line); }
  .fb-risk:last-child { border-bottom:0; }
  .fb-risk .fr-id { font-family:var(--mono); font-size:11px; color:var(--ink-3); }
  .fb-risk .fr-title { font-family:var(--serif); font-size:14px; color:var(--ink); }
  .fb-risk .fr-scenario { font-family:var(--mono); font-size:10.5px; color:var(--ink-3); margin-top:2px; }
  .fb-sev { display:flex; align-items:center; gap:5px; justify-content:flex-end; }
  .fb-sev .fs-bar { display:flex; gap:2px; }
  .fb-sev .fs-bar i { width:6px; height:14px; border-radius:1px; background:var(--line); display:block; }
  .fb-sev[data-sev="high"] .fs-bar i:nth-child(-n+3) { background:var(--accent); }
  .fb-sev[data-sev="mid"]  .fs-bar i:nth-child(-n+2) { background:var(--rust); }
  .fb-sev[data-sev="low"]  .fs-bar i:nth-child(-n+1) { background:var(--warm-gray); }
  .fb-sev .fs-lbl { font-family:var(--mono); font-size:9.5px; color:var(--ink-3); }

  /* path cards with recommend badge */
  .fb-path { border:1px solid var(--line); border-radius:7px; padding:14px 16px; margin-bottom:10px; background:#fff; }
  .fb-path.rec { border-color:var(--sage); background:#f7fdf4; }
  .fb-path .fp-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .fb-path .fp-name { font-family:var(--serif); font-size:15px; font-weight:600; }
  .fb-path .fp-badge { font-family:var(--mono); font-size:9px; padding:2px 8px; border-radius:9px; background:var(--sage); color:#fff; letter-spacing:.06em; text-transform:uppercase; flex-shrink:0; }
  .fb-path .fp-core { font-family:var(--mono); font-size:10.5px; color:var(--ink-3); margin-bottom:6px; }
  .fb-path .fp-stats { display:flex; gap:16px; font-family:var(--mono); font-size:10.5px; color:var(--ink-2); margin-top:8px; }
  .fb-path .fp-stats b { color:var(--ink); }
</style>
</head>

  const LANG = () => document.body.dataset.lang || 'zh';
  const T = key => (I18N[LANG()] || I18N.zh)[key] ?? (I18N.zh[key] ?? key);
  // data field: prefer <field>_en in EN mode, fall back to base
  const tf = (obj, field) => {
    if (!obj) return '';
    if (LANG() === 'en' && obj[field + '_en']) return obj[field + '_en'];
    return obj[field] ?? '';
  };
  // Voice titles are the original English Reddit text. In zh mode, show a subtle
  // Chinese translation under the English original (title_zh, produced by the
  // pipeline). In en mode, no subtitle.
  const voiceZh = v => (LANG() === 'zh' && v && v.title_zh) ? v.title_zh : '';
  const zhLine = v => { const z = voiceZh(v); return z ? `<div class="v-zh">${esc(z)}</div>` : ''; };
  // Parse the source subreddit ("r/xxx") from a voice url, for source tags.
  const subOf = url => { const m = /reddit\.com\/r\/([A-Za-z0-9_]+)/.exec(url || ''); return m ? 'r/' + m[1] : (/(news\.)?ycombinator/.test(url||'') ? 'HN' : 'web'); };
  // Brand official-site SEARCH link (no LLM-emitted URLs → zero dead links).
  const brandSearch = name => 'https://duckduckgo.com/?q=' + encodeURIComponent((name || '') + ' official site');
  function applyI18n(){
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = T(el.dataset.i18n);
    });
  }

  // ---- Theme/player lookup (lang-aware) ----
  const themeLabel = id => { const t = data.themes.find(t => t.id === id); return t ? tf(t, 'label') : id; };
  const playerName = id => { const p = data.players.find(p => p.id === id); return p ? tf(p, 'name') : id; };

  const verdictStatus = (data.verdict && data.verdict.status) || 'partial';

  // ---- Chrome (title, brand, verdict pill) — re-runnable on lang switch ----
  function renderChrome(){
    document.getElementById('docTitle').textContent = `${tf(data.meta,'idea')} · CATEGORY DEEP DIVE`;
    document.getElementById('brandLabel').innerHTML = `<b>VIBE</b> · CATEGORY DEEP DIVE · ${esc(tf(data.meta,'idea'))}`;
    const pill = document.getElementById('verdictPill');
    pill.dataset.status = verdictStatus;
    pill.textContent = T('verdict.' + verdictStatus);
    applyI18n();
    // mode-aware radar legend (override the static i18n labels)
    const lp = document.querySelector('[data-i18n="legend.voicePos"]');
    const ln = document.querySelector('[data-i18n="legend.voiceNeg"]');
    if (lp) lp.textContent = sentLabel('pos');
    if (ln) ln.textContent = sentLabel('neg');
  }
  document.body.dataset.mode   = data.meta.mode || 'EXISTING';
  document.body.dataset.status = verdictStatus;

  // ---- Inline SVG icons (stroke-based, inherit currentColor) ----
  const IC = {
    section: '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>',
    category:'<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    users:   '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 5.5a3 3 0 0 1 0 5.8M21 20a6 6 0 0 0-4-5.6"/></svg>',
    grid:    '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M7.5 7.5 11 16M16.5 7.5 13 16"/></svg>',
    target:  '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/></svg>',
    stack:   '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3 21 8l-9 5-9-5 9-5Z"/><path d="M3 13l9 5 9-5M3 17l9 5 9-5"/></svg>',
    warn:    '<svg class="fb-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3 22 20H2L12 3Z"/><path d="M12 10v5M12 18h.01"/></svg>',
  };
  const statusIcon = { real:'✓', partial:'◐', insufficient:'⚠' };
  const polCls   = p => ({ win:'pos', pain:'neg', neutral:'neu', pos:'pos', neg:'neg' }[p] || 'neu');
  const polLabel = p => ({ win:'win', pain:'pain', neutral:'·', pos:'pos', neg:'neg' }[p] || p);

  // ---- Mode-aware framing ----
  // EXISTING market → voices read as product reviews (好评 / 差评).
  // NON_STOCK market → voices read as demand validation (需求信号 / 痛点缺口).
  const isNonStock = () => (data.meta.mode || 'EXISTING') === 'NON_STOCK';
  const sentLabel  = sent => sent === 'pos'
      ? (isNonStock() ? T('sent.demand') : T('sent.praise'))
      : (isNonStock() ? T('sent.gap')    : T('sent.complaint'));

  // ---- Render evidence counter strip (top-left of graph) ----
  function renderEvidenceCounter(){
    const c = (data.verdict && data.verdict.evidence_counts) || {};
    document.getElementById('evidenceCounter').innerHTML = `
      <span><b>${(data.voices||[]).length || c.raw_voices || 0}</b> ${T('ov.counts.raw')}</span>
      <span><b>${(data.themes||[]).length}</b> ${T('ov.counts.themes')}</span>`;
  }

  // ---- Render OVERVIEW lens ----
  function renderOverview(){
    const v = data.verdict || {};
    const counts = v.evidence_counts || {};
    const findings = (tf(v, 'key_findings') || v.key_findings || []).map((t,i) =>
      `<div class="fb-finding"><span class="ff-num">${i+1}</span><p>${t}</p></div>`).join('');
    document.getElementById('lensOverview').innerHTML = `
      <div class="verdict-card">
        <div class="pc-meta">VERDICT · ${esc(data.meta.timestamp)}</div>
        <div class="v-title">${esc(tf(data.meta,'thesis'))}</div>
        <div class="v-counts">
          <div><b>${(data.voices||[]).length || counts.raw_voices || 0}</b> ${T('ov.counts.raw')}</div>
          <div><b>${(data.themes||[]).length}</b> ${T('ov.counts.themes')}</div>
        </div>
      </div>
      <h4>${T('ov.findings')}</h4>
      <div class="fb-findings">${findings}</div>`;
  }

  // ---- Render PLAYERS lens ----
  function renderPlayers(){
    const statusLabel = s => ({ live: LANG()==='zh'?'在售':'live', rumored: LANG()==='zh'?'未发布':'rumored',
                                stagnant: LANG()==='zh'?'停滞':'stagnant', dead: LANG()==='zh'?'退场':'dead' }[s] || s);
    const chips = data.players.map(p =>
      `<button class="chip" data-player-id="${esc(p.id)}">${esc(tf(p,'name'))}</button>`
    ).join('');
    const cards = data.players.map(p => {
      const playerVoices = data.voices.filter(v => v.player === p.id)
        .sort((a,b) => Math.abs(b.score) - Math.abs(a.score)).slice(0, 5);
      const voiceRows = playerVoices.map(v => {
        const themes = v.themes.map(themeLabel).join(' · ');
        return `<div class="voice-row ${esc(v.sentiment)}">
            <span class="dot">●</span>
            <div><div class="vt"><a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(tf(v,'title'))}</a></div>${zhLine(v)}
              <div class="vm">${esc(themes)}</div></div>
            <span class="vs">↑${fmtNum(Math.abs(v.score))}</span>
          </div>`;
      }).join('');
      const mkt = (data.marketplace || []).find(m => m.player === p.id);
      const mktBlock = mkt
        ? `<h4>${T('pl.mkt')}</h4><p>${esc(mkt.platform)} <b>⭐ ${mkt.rating}</b> · ${fmtNum(mkt.review_count)} · ${(mkt.top_complaints || []).map(esc).join(' / ')}</p>`
        : '';
      const meta = [p.price, p.subscription, statusLabel(p.status)].filter(Boolean).map(esc).join(' · ');
      const voicesBlock = voiceRows ? `<h4>${T('pl.topVoices')}</h4>${voiceRows}`
        : `<p style="font-style:italic;color:var(--ink-3)">${T('pl.smallSample')}</p>`;
      return `<article class="player-card" data-player-id="${esc(p.id)}">
        <h3>${esc(tf(p,'name'))}</h3><div class="pc-meta">${meta}</div>
        <p class="pc-summary">${esc(tf(p,'summary'))}</p>${voicesBlock}${mktBlock}
      </article>`;
    }).join('');
    document.getElementById('lensPlayers').innerHTML = `<div class="player-chips">${chips}</div>${cards}`;
  }

  // ---- Render VOICES lens (grouped filter bar) ----
  function renderVoicesScaffold(){
    const themeChips = data.themes.map(t =>
      `<button class="chip" data-filter="theme" data-val="${esc(t.id)}">${esc(tf(t,'label'))}</button>`
    ).join('');
    document.getElementById('voiceFilter').innerHTML = `
      <div class="fb-group">
        <span class="fb-lbl">${T('vo.sentiment')}</span>
        <button class="chip active" data-filter="sent" data-val="all">${T('vo.all')}</button>
        <button class="chip" data-filter="sent" data-val="pos">● ${sentLabel('pos')}</button>
        <button class="chip" data-filter="sent" data-val="neg">● ${sentLabel('neg')}</button>
      </div>
      <div class="fb-group">
        <span class="fb-lbl">${T('vo.theme')}</span>
        <button class="chip active" data-filter="theme" data-val="all">${T('vo.all')}</button>
        ${themeChips}
      </div>`;
  }

  // ---- Render OPPORTUNITY lens ----
  function renderOpportunity(){
    const o = data.opportunity || {};
    document.getElementById('lensOpportunity').innerHTML = `<div class="opp-card">
        <h3>${esc(tf(o,'label') || '★')}</h3><p>${esc(tf(o,'summary'))}</p>
      </div>`;
  }

  // ---- Render STRATEGY lens ----
  function renderStrategy(){
    const paths = (data.paths || []).map(p => {
      const cls = p.recommended ? 'fb-path rec' : 'fb-path';
      const stats = [p.time && `${T('st.time')} <b>${esc(p.time)}</b>`,
                     p.investment && `${T('st.invest')} <b>${esc(p.investment)}</b>`,
                     p.moat && `${T('st.moat')} <b>${T('moat.'+p.moat) || esc(p.moat)}</b>`].filter(Boolean).join('');
      return `<div class="${cls}">
          <div class="fp-head"><span class="fp-name">${esc(tf(p,'label'))}</span>
            ${p.recommended ? `<span class="fp-badge">${T('st.recommend')}</span>` : ''}</div>
          <div class="fp-core">${esc(tf(p,'core'))}</div>
          <p style="margin:0;font-size:13px;color:var(--ink-2)">${esc(tf(p,'description'))}</p>
          ${stats ? `<div class="fp-stats">${stats}</div>` : ''}
        </div>`;
    }).join('');
    document.getElementById('lensStrategy').innerHTML = paths || '<p style="color:var(--ink-3);font-style:italic">—</p>';
  }

  // ---- Render RISKS lens (severity bars) ----
  function renderRisks(){
    const sevLabel = { high:T('rk.sevHigh'), mid:T('rk.sevMid'), low:T('rk.sevLow') };
    const rows = (data.risks || []).map(r => `
      <div class="fb-risk">
        <span class="fr-id">${esc(r.id)}</span>
        <div><div class="fr-title">${esc(tf(r,'title'))}</div><div class="fr-scenario">${esc(tf(r,'scenario'))}</div></div>
        <div class="fb-sev" data-sev="${esc(r.severity)}">
          <span class="fs-lbl">${sevLabel[r.severity] || r.severity}</span>
          <span class="fs-bar"><i></i><i></i><i></i></span>
        </div>
      </div>`).join('');
    document.getElementById('lensRisks').innerHTML = rows || '<p style="color:var(--ink-3);font-style:italic">—</p>';
  }

  // ---- Render FALLBACK long-form report (§1-§6) with icons + viz ----
  function renderFallback(){
    const v = data.verdict || {};
    const counts = v.evidence_counts || {};
    const sevLabel = { high:T('rk.sevHigh'), mid:T('rk.sevMid'), low:T('rk.sevLow') };

    // ---- objective aggregates: mentions / % of corpus (R2/R3) ----
    const allV   = data.voices || [];
    const N      = allV.length || 1;
    const pct    = n => Math.round(n / N * 100);
    const posV   = allV.filter(x => x.sentiment === 'pos').sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    const negV   = allV.filter(x => x.sentiment !== 'pos').sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    const posPct = pct(posV.length);
    const modeLabel = isNonStock() ? T('mode.nonstock') : T('mode.existing');
    const themeCounts = data.themes.map(t => ({ t, n: allV.filter(x=>x.themes.includes(t.id)).length }))
                                   .filter(x => x.n > 0)   // drop themes no voice maps to
                                   .sort((a,b)=>b.n-a.n);
    const maxTN = Math.max(1, ...themeCounts.map(x=>x.n));
    const playerStats = data.players.map(p => {
      const pv = allV.filter(x => x.player === p.id);
      const pos = pv.filter(x=>x.sentiment==='pos').length;
      return { p, n: pv.length, pos, neg: pv.length - pos };
    }).sort((a,b)=>b.n-a.n);
    const maxPN = Math.max(1, ...playerStats.map(s=>s.n));
    const commMap = {}; allV.forEach(x => { const s = subOf(x.url); commMap[s] = (commMap[s]||0)+1; });
    const comms = Object.entries(commMap).sort((a,b)=>b[1]-a[1]);

    // Section conclusions: prefer the LLM's core-insight paragraph
    // (data.section_insights, language-aware); fall back to an objective
    // data-derived one-liner when an insight isn't available.
    const L = (zh,en) => LANG()==='zh' ? zh : en;
    const SI = data.section_insights || {};
    const insight = (key, fb) => { const t = tf(SI, key); return t ? esc(t) : fb; };
    const topTheme = themeCounts[0] ? esc(tf(themeCounts[0].t,'label')) : '—';
    const topThemePct = themeCounts[0] ? pct(themeCounts[0].n) : 0;
    const negByTheme = data.themes.map(t => ({ t, n: allV.filter(x=>x.themes.includes(t.id) && x.sentiment!=='pos').length })).sort((a,b)=>b.n-a.n);
    const topNegTheme = (negByTheme[0] && negByTheme[0].n) ? esc(tf(negByTheme[0].t,'label')) : '';
    const leader = playerStats[0];
    const oppLabel = esc(tf(data.opportunity||{},'label'));
    const _rk = data.risks || [];
    const topSev = _rk.some(r=>r.severity==='high')?L('高','high'):(_rk.some(r=>r.severity==='mid')?L('中','mid'):L('低','low'));
    const secSum = txt => txt ? `<p class="sec-summary">${txt}</p>` : '';
    const s1sum = insight('market', L(`已采集 <b>${N}</b> 条真实讨论,覆盖 <b>${comms.length}</b> 个社区;整体 <b>${posPct}%</b> 正向,讨论最集中在「${topTheme}」。`,
                    `<b>${N}</b> real discussions across <b>${comms.length}</b> communities; <b>${posPct}%</b> positive overall, most concentrated on “${topTheme}”.`));
    const s2sum = insight('user', L(`用户最在意「${topTheme}」(<b>${topThemePct}%</b> 提及)。${topNegTheme?`不满主要集中在「${topNegTheme}」。`:`负面声音很少。`}`,
                    `Users care most about “${topTheme}” (<b>${topThemePct}%</b> of mentions).${topNegTheme?` Complaints cluster on “${topNegTheme}”.`:` Few negatives.`}`));
    const s3sum = insight('competitive', leader ? L(`<b>${esc(tf(leader.p,'name'))}</b> 占据 <b>${pct(leader.n)}%</b> 声量、领先;共 ${data.players.length} 个玩家被讨论。`,
                             `<b>${esc(tf(leader.p,'name'))}</b> leads with <b>${pct(leader.n)}%</b> share of voice; ${data.players.length} players discussed.`) : '');
    const s4sum = L(`讨论量前三的真实需求:${themeCounts.slice(0,3).map(x=>esc(tf(x.t,'label'))).join(' · ')}。`,
                    `Top-3 most-discussed real needs: ${themeCounts.slice(0,3).map(x=>esc(tf(x.t,'label'))).join(' · ')}.`);
    const s7sum = L(`按赞数排序的 ${Math.min(10,N)} 条代表性真实原声。`, `${Math.min(10,N)} representative real voices, ranked by upvotes.`);
    const s5sum = insight('opportunity', oppLabel ? L(`关键空白机会:${oppLabel};下方为可选的切入策略路径。`,
                               `Key white-space: ${oppLabel}; candidate entry-strategy paths below.`) : '');
    const s6sum = insight('risk', _rk.length ? L(`共识别 ${_rk.length} 项主要风险,最高级别:${topSev}。`,
                                 `${_rk.length} key risks identified; highest severity: ${topSev}.`) : '');

    const measured = `<span class="kicker measured">${T('ins.measured')}</span>`;
    const judgment = `<span class="kicker judgment">${T('ins.judgment')}</span>`;
    const rnote = txt => `<div class="read-note">${txt}</div>`;

    const splitBar = `<div class="ins-bar">
      ${posV.length?`<span class="seg pos" style="width:${Math.max(posPct,12)}%">${sentLabel('pos')} ${posPct}%</span>`:''}
      ${negV.length?`<span class="seg neg" style="width:${Math.max(100-posPct,12)}%">${sentLabel('neg')} ${100-posPct}%</span>`:''}
    </div>`;
    const themeBars = themeCounts.map(({t,n})=>`<div class="ins-trow">
        <span class="ins-tlabel">${esc(tf(t,'label'))}</span>
        <span class="ins-tbar"><i class="${polCls(t.polarity)}" style="width:${Math.round(n/maxTN*100)}%"></i></span>
        <span class="ins-tcount">${pct(n)}%</span></div>`).join('');
    const sovBars = playerStats.filter(s=>s.n>0).map(s=>`<div class="ins-trow">
        <span class="ins-tlabel">${esc(tf(s.p,'name'))}</span>
        <span class="ins-tbar"><i class="pos" style="width:${Math.round(s.n/maxPN*100)}%"></i></span>
        <span class="ins-tcount">${pct(s.n)}%</span></div>`).join('') || '<p class="meta">—</p>';
    const marketCards = `<div class="ins-grid">
      <div class="ins-card">${measured}
        <h4>${isNonStock()?T('ins.demandSplit'):T('ins.split')}</h4>
        <div class="ins-stat-row">
          <div class="ins-stat"><b>${allV.length}</b><span>${T('ov.counts.raw')}</span></div>
          <div class="ins-stat"><b>${comms.length}</b><span>${T('ins.communities')}</span></div>
          <div class="ins-stat"><b>${data.players.length}</b><span>${T('ov.counts.players')}</span></div>
        </div>
        ${splitBar}${rnote(T('ins.rnSplit'))}
      </div>
      <div class="ins-card">${measured}<h4>${T('ins.themeDist')}</h4>${themeBars}${rnote(T('ins.rnTheme'))}</div>
    </div>`;

    // theme × sentiment heatmap (color is the signal)
    const hmRows = themeCounts.map(({t}) => {
      const tv = allV.filter(x=>x.themes.includes(t.id));
      const pos = tv.filter(x=>x.sentiment==='pos').length;
      return { t, pos, neg: tv.length - pos };
    });
    const hmMax = Math.max(1, ...hmRows.flatMap(r=>[r.pos,r.neg]));
    const hmCell = (val,kind) => { if(!val) return 'background:#efe9db;color:#c7c0ad';
      const a = (0.20 + (val/hmMax)*0.80).toFixed(2);
      return `background:rgba(${kind==='pos'?'125,153,112':'188,116,89'},${a})`; };
    const heatmap = `<table class="hm"><thead><tr><th></th><th>${sentLabel('pos')}</th><th>${sentLabel('neg')}</th></tr></thead><tbody>
      ${hmRows.map(r=>`<tr><td class="hm-th">${esc(tf(r.t,'label'))}</td>
        <td class="cell" style="${hmCell(r.pos,'pos')}">${r.pos||''}</td>
        <td class="cell" style="${hmCell(r.neg,'neg')}">${r.neg||''}</td></tr>`).join('')}
    </tbody></table>`;

    const qcol = (arr,cls,title)=>`<div class="ins-qcol ${cls}"><h4><span class="qdot"></span>${title}</h4>
      ${arr.slice(0,4).map(x=>`<div class="ins-q ${cls}">"${esc(tf(x,'title'))}"${zhLine(x)}
        <span class="qsrc">${esc(subOf(x.url))} · ↑${fmtNum(Math.abs(x.score))} · <a href="${esc(x.url)}" target="_blank" rel="noopener">link</a></span>
      </div>`).join('') || '<p class="meta">—</p>'}</div>`;
    const groupedQuotes = `<div class="ins-quotes">
      ${qcol(posV,'pos', isNonStock()?T('ins.topDemand'):T('ins.topPraise'))}
      ${qcol(negV,'neg', isNonStock()?T('ins.topGap'):T('ins.topComplaint'))}
    </div>`;

    // brand comparison table (objective: mentions, share, sentiment, site search)
    const brandTable = `<table class="bt"><thead><tr>
        <th>${T('ins.btBrand')}</th><th>${T('ins.mentions')}</th><th>${T('ins.btShare')}</th>
        <th>${T('ins.btSent')}</th><th>${T('ins.btMeta')}</th></tr></thead><tbody>
      ${playerStats.map(s=>{ const tot=s.n||1;
        const meta=[s.p.price,s.p.subscription,s.p.status].filter(Boolean).map(esc).join(' · ');
        return `<tr>
          <td><span class="bt-name">${esc(tf(s.p,'name'))}</span><br>
            <a class="bt-link" href="${brandSearch(tf(s.p,'name'))}" target="_blank" rel="noopener">${T('ins.btSite')} ↗</a></td>
          <td class="bt-num">${s.n}</td><td class="bt-num">${pct(s.n)}%</td>
          <td><span class="bt-mini"><i class="pos" style="width:${Math.round(s.pos/tot*100)}%"></i><i class="neg" style="width:${Math.round(s.neg/tot*100)}%"></i></span><span class="bt-sent"><span class="p">${s.pos}</span> / <span class="n">${s.neg}</span></span></td>
          <td style="font-size:12.5px;color:var(--ink-2)">${esc(s.p.price||'')||'—'}${s.p.status?` · ${esc(s.p.status)}`:''}</td></tr>`; }).join('')}
    </tbody></table>`;

    // deep-dive trio (top 3 themes, each with linked stories + objective takeaway)
    const deepDive = `<div class="ins-grid" style="grid-template-columns:repeat(3,1fr)">
      ${themeCounts.slice(0,3).map(({t,n})=>{
        const tv = allV.filter(x=>x.themes.includes(t.id)).sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
        const pos = tv.filter(x=>x.sentiment==='pos').length;
        const stories = tv.slice(0,2).map(x=>`<div class="ins-q ${x.sentiment==='pos'?'pos':'neg'}">"${esc(tf(x,'title'))}"${zhLine(x)}
          <span class="qsrc">${esc(subOf(x.url))} · ↑${fmtNum(Math.abs(x.score))} · <a href="${esc(x.url)}" target="_blank" rel="noopener">link</a></span></div>`).join('');
        return `<div class="ins-card"><h4 style="color:${t.color}">${esc(tf(t,'label'))}</h4>
          ${stories || '<p class="meta">—</p>'}
          <div class="read-note"><b>${pct(n)}%</b> ${T('ins.discussed')} · <b>${tv.length?Math.round(pos/tv.length*100):0}%</b> ${sentLabel('pos')}</div></div>`;
      }).join('')}
    </div>`;

    // quote wall (verbatim, source-tagged)
    const wall = [...allV].sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).slice(0,10).map(x=>`
      <div class="tile ${x.sentiment==='pos'?'':'neg'}">"${esc(tf(x,'title'))}"${zhLine(x)}
        <span class="qw-src">${esc(subOf(x.url))} · ↑${fmtNum(Math.abs(x.score))} · <a href="${esc(x.url)}" target="_blank" rel="noopener">link</a></span></div>`).join('');

    // language-aware array getter (for open_questions / open_questions_en)
    const tfArr = (o,f) => { if(!o) return []; if(LANG()==='en' && Array.isArray(o[f+'_en'])) return o[f+'_en']; return Array.isArray(o[f])?o[f]:[]; };
    // voice lookup for evidence links (▸ back to the real supporting post)
    const vById = {}; (data.voices||[]).forEach(v => vById[v.id] = v);
    const evLinks = ids => (ids||[]).map(id => { const v = vById[id]; return v
        ? `<a class="ev-link" href="${esc(v.url)}" target="_blank" rel="noopener" title="${esc(tf(v,'title'))}">▸</a>` : ''; }).join('');

    // ENTRY DIRECTIONS — advisory (hypothesis + evidence + open questions + risk),
    // not a definitive recommendation. Falls back to old path fields for old data.
    const pathCards = (data.paths || []).map(p => {
      const adv = tf(p,'hypothesis') || tf(p,'evidence') || tfArr(p,'open_questions').length || tf(p,'risk');
      if (adv) {
        const oq = tfArr(p,'open_questions');
        return `<div class="fb-path adv">
          <div class="fp-head"><span class="fp-name">${esc(tf(p,'label'))}</span></div>

          ${oq.length?`<div class="fp-row"><b>${T('st.openq')}</b><ul class="fp-oq">${oq.map(q=>`<li>${esc(q)}</li>`).join('')}</ul></div>`:''}

      const stats = [p.time && `${T('st.time')} <b>${esc(p.time)}</b>`,
                     p.investment && `${T('st.invest')} <b>${esc(p.investment)}</b>`,

      return `<div class="fb-path ${p.recommended?'rec':''}">
          <div class="fp-head"><span class="fp-name">${esc(tf(p,'label'))}</span>${p.recommended?`<span class="fp-badge">${T('st.recommend')}</span>`:''}</div>
          <div class="fp-core">${esc(tf(p,'core'))}</div>
          <p style="margin:0;font-size:13px;color:var(--ink-2)">${esc(tf(p,'description'))}</p>
          ${stats?`<div class="fp-stats">${stats}</div>`:''}</div>`; }).join('');

    // USER & DEMAND DECOMPOSITION (VOC-style; each item ▸ links to real voices)
    const UD = data.user_demand || {};
    const udCards = (arr, nameK, cls) => (arr||[]).map(x => `

    // Usage scenarios → ranked share bars (more scannable than card paragraphs)

    const hasUD = tf(UD,'jtbd') || scen.length || (UD.unmet_needs||[]).length;

    // 需求地图 / 机会矩阵 — X=讨论热度, Y=满足度; 右下角(高需求×低满足)=空白机会
    const mThemes = themeCounts.map(({t,n}) => {

    const demandMatrix = mThemes.length ? (() => {
      const W=760,H=400,padL=46,padR=18,padT=22,padB=46;

      const maxD = Math.max(1, ...mThemes.map(m=>m.demand));

      const xAt = d => padL + (d/maxD)*iW;

      const bubbles = mThemes.map(m => {
        const r = 6 + (m.n/maxN)*16, x=xAt(m.demand), y=yAt(m.satis);

      const axes = `
        <text x="${padL}" y="${(padT+iH+30).toFixed(1)}" font-size="11" fill="#737277">${L('讨论热度 →','Discussion volume →')}</text>

    })() : '';
    const risks = (data.risks || []).map(r => `
      <div class="fb-risk"><span class="fr-id">${esc(r.id)}</span>
        <div><div class="fr-title">${esc(tf(r,'title'))}</div><div class="fr-scenario">${esc(tf(r,'scenario'))} → <i>${esc(tf(r,'mitigation'))}</i></div></div>
        <div class="fb-sev" data-sev="${esc(r.severity)}"><span class="fs-lbl">${sevLabel[r.severity]||r.severity}</span><span class="fs-bar"><i></i><i></i><i></i></span></div>
      </div>`).join('');
    const failures = (data.failures || []).map(f => `<li><b>${esc(tf(f,'name'))}</b> (${esc(f.years)}) — ${esc(tf(f,'what'))}${tf(f,'lesson') ? ' — <i>'+esc(tf(f,'lesson'))+'</i>':''}</li>`).join('');

    // discussion-trend chart (Reddit yearly volume, or Google interest if available)
    const trend = data.trend || [];
    const trendChart = trend.length >= 3 ? (() => {
      const vals = trend.map(t => t.count != null ? t.count : (t.value || 0));
      const mx = Math.max(1, ...vals);
      const W = 760, H = 150, padL = 8, padR = 12, padT = 22, padB = 26;
      const iW = W - padL - padR, iH = H - padT - padB;
      const xAt = i => padL + (trend.length === 1 ? iW/2 : (i/(trend.length-1))*iW);
      const yAt = val => padT + iH - (val/mx)*iH;
      const line = vals.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
      const area = `${padL.toFixed(1)},${(padT+iH).toFixed(1)} ${line} ${(padL+iW).toFixed(1)},${(padT+iH).toFixed(1)}`;
      const grid = [0,0.5,1].map(f=>`<line x1="${padL}" y1="${(padT+iH-f*iH).toFixed(1)}" x2="${(padL+iW).toFixed(1)}" y2="${(padT+iH-f*iH).toFixed(1)}" stroke="#e7e0d0" stroke-width="1"/>`).join('');
      const dots = vals.map((v,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="3.2" fill="#5b7a52"/>
        <text x="${xAt(i).toFixed(1)}" y="${(yAt(v)-8).toFixed(1)}" font-size="10" fill="#4a6043" text-anchor="middle">${v}</text>
        <text x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="10" fill="#9a978f" text-anchor="middle">${esc(trend[i].period)}</text>`).join('');
      const srcLabel = data.trend_source === 'google'
        ? L('Google 搜索热度','Google search interest')
        : L('Reddit 讨论量 · pullpush 归档','Reddit discussion volume · pullpush archive');
      const rn = data.trend_source === 'google'
        ? L('读法:Google 搜索兴趣指数(0-100,峰值=100),反映需求关注度趋势。','How to read: Google search-interest index (0-100, peak=100) — attention/demand over time.')
        : L('读法:按年统计的真实贴文量趋势线;受 pullpush 归档完整度影响,作量级参考,非精确总量。','How to read: yearly real-post-count trend line; affected by archive completeness — a magnitude trend, not exact totals.');
      return `<h3>${L('讨论热度趋势','Discussion trend')} · <span style="font-size:12px;color:var(--ink-3);font-weight:400">${srcLabel}</span></h3>
        <svg class="trend-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          ${grid}
          <polygon points="${area}" fill="rgba(125,153,112,0.13)"/>
          <polyline points="${line}" fill="none" stroke="#5b7a52" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
        </svg>${rnote(rn)}`;
    })() : '';

    const methodology = `<div class="meth">${T('ins.methodBody')}
      <div class="meth-src">${T('ins.communities')}: ${comms.slice(0,10).map(c=>esc(c[0])+' ('+c[1]+')').join(' · ')||'—'}</div>
      <div class="meth-gaps"><b>${T('ins.gaps')}:</b> ${T('ins.gapsBody')}</div></div>`;

    const cw = data.meta.collection_window;
    document.getElementById('fbBody').innerHTML = `
      <div class="meta">VIBE · CATEGORY DEEP DIVE · №${esc((data.meta.slug||'').toUpperCase())} · ${esc(data.meta.timestamp)}</div>
      <h1>${esc(tf(data.meta,'thesis') || tf(data.meta,'idea'))}</h1>
      <p class="fb-deck">${esc(tf(data.meta,'deck'))}</p>

      <div class="fb-verdict-viz" data-status="${verdictStatus}">
        <div class="vv-status"><span class="vv-icon">${statusIcon[verdictStatus]||'◐'}</span><span class="vv-label">${T('verdict.'+verdictStatus).replace(/^\S+\s/, '')}</span></div>
        <div class="vv-body">
          <div class="vv-rationale">${esc(tf(v,'rationale'))}</div>
          <div class="fb-counts-row">
            <div class="fc"><b>${allV.length}</b><span>${T('ov.counts.raw')}</span></div>
            <div class="fc"><b>${(data.themes||[]).length}</b><span>${T('ov.counts.themes')}</span></div>
            <div class="fc"><b>${comms.length}</b><span>${T('ins.communities')}</span></div>
          </div>
        </div>
      </div>

      <h2>${IC.category}<span class="secnum">§1</span>${T('fb.s1')}${measured}</h2>
      ${secSum(s1sum)}
      <div class="ins-mode">${esc(modeLabel)}</div>
      ${marketCards}
      ${trendChart}
      <h3>${T('ins.shareOfVoice')}</h3>${sovBars}${rnote(T('ins.rnSov'))}

      <h2>${IC.users}<span class="secnum">§2</span>${T('fb.s2')}${measured}</h2>
      ${secSum(s2sum)}
      <h3>${T('ins.heatmap')}</h3>${heatmap}${rnote(T('ins.rnHeat'))}
      ${groupedQuotes}

      ${hasUD ? `<h2>${IC.users}<span class="secnum">§3</span>${T('ud.section')}${measured}</h2>
      ${demandSection}` : ''}

      <h2>${IC.grid}<span class="secnum">${hasUD?'§4':'§3'}</span>${T('fb.s3')}${measured}</h2>
      ${secSum(s3sum)}
      <h3>${T('ins.brandTable')}</h3>${brandTable}${rnote(T('ins.rnBrand'))}
      ${failures ? `<h3>${T('fb.failures')}</h3><ul>${failures}</ul>` : ''}

      <h2>${IC.stack}<span class="secnum">${hasUD?'§5':'§4'}</span>${T('ins.deepdive')}${measured}</h2>
      ${secSum(s4sum)}
      ${deepDive}${rnote(T('ins.rnDeep'))}

      <h2>${IC.target}<span class="secnum">${hasUD?'§6':'§5'}</span>${T('fb.s4')}${judgment}</h2>
      ${secSum(s5sum)}
      ${demandMatrix ? `<h3>${T('ud.matrix')}${measured}</h3>${demandMatrix}` : ''}
      <p><b>${esc(tf(data.opportunity||{},'label'))}</b> · ${esc(tf(data.opportunity||{},'summary'))}</p>
      ${pathCards ? `<h3>${T('st.dirs')}</h3><p class="sec-summary">${T('st.dirsNote')}</p>${pathCards}` : ''}

      <h2>${IC.warn}<span class="secnum">${hasUD?'§7':'§6'}</span>${T('fb.s6')}${judgment}</h2>
      ${secSum(s6sum)}

      <p class="meta" style="margin-top:30px">schema v${esc(data.schema_version || '1.0')}${cw?` · ${esc(cw.from)} – ${esc(cw.to)}`:''}</p>`;
    buildReportNav();
