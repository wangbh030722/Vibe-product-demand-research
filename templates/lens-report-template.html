  // ---- Raw-voice appendix: filter rows by sentiment / community ----
  let _vaWired = false;
  function wireVoiceAppendix(){
    if (_vaWired) return;          // delegate once; #fbBody persists across re-renders
    const fb = document.getElementById('fbBody');
    if (!fb) return;
    _vaWired = true;
    fb.addEventListener('click', (ev) => {
      const btn = ev.target.closest('.va-filter'); if (!btn) return;
      const tb = btn.closest('.va-toolbar'); if (!tb) return;
      tb.querySelectorAll('.va-filter').forEach(b => b.classList.toggle('active', b === btn));
      const f = btn.dataset.f;
      const wrap = tb.parentNode;
      const rows = [...wrap.querySelectorAll('.va-row')];
      let shown = 0;
      rows.forEach(r => {
        const ok = f === 'all' ? true
          : f === 'pos' ? r.dataset.sent === 'pos'
          : f === 'neg' ? r.dataset.sent === 'neg'
          : f.startsWith('sub:') ? r.dataset.sub === f.slice(4) : true;
        r.style.display = ok ? '' : 'none';
        if (ok) shown++;
      });
      const cnt = wrap.querySelector('.va-count');
      if (cnt) cnt.querySelector('b').textContent = shown;
    });
  }

  // ---- Sticky section nav for the full report (one-click jump + scroll-spy) ----
  let _navObs = null;
  function buildReportNav(){
    const fb = document.getElementById('fbBody');
    if (!fb) return;
    const old = fb.querySelector('.fb-nav'); if (old) old.remove();
    const h2s = [...fb.querySelectorAll('h2')];
    if (h2s.length < 2) return;
    h2s.forEach((h, i) => { h.id = 'fbsec-' + i; });
    const links = h2s.map((h, i) => {
      const clone = h.cloneNode(true);
      clone.querySelectorAll('.kicker, .fb-icon, svg').forEach(e => e.remove());
      const num = (clone.querySelector('.secnum') || {}).textContent || ('§' + (i + 1));
      const sn = clone.querySelector('.secnum'); if (sn) sn.remove();
      const title = clone.textContent.trim();
      return `<a class="fbn-link" href="#fbsec-${i}" data-i="${i}">${esc(num)} ${esc(title)}</a>`;
    }).join('');
    const nav = document.createElement('nav');
    nav.className = 'fb-nav';
    nav.innerHTML = `<span class="fbn-label">${esc(T('report.divider'))}</span><div class="fbn-links">${links}</div>`;
    fb.insertBefore(nav, fb.firstChild);
    nav.addEventListener('click', (ev) => {
      const a = ev.target.closest('.fbn-link'); if (!a) return;
      ev.preventDefault();
      const el = document.getElementById('fbsec-' + a.dataset.i);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    // scroll-spy: highlight the section currently in view
    if (_navObs) _navObs.disconnect();
    const linkEls = [...nav.querySelectorAll('.fbn-link')];
    _navObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const i = h2s.indexOf(e.target);
          linkEls.forEach(l => l.classList.toggle('active', +l.dataset.i === i));
          const al = linkEls[i]; if (al && al.scrollIntoView) al.scrollIntoView({ block: 'nearest', inline: 'center' });
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px' });
    h2s.forEach(h => _navObs.observe(h));
  }

  // ---- Master render (re-runnable for lang switch) ----
  function renderAll(){
    renderChrome();
    renderEvidenceCounter();
    renderOverview();
    renderPlayers();
    renderVoicesScaffold();
    renderOpportunity();
    renderStrategy();
    renderRisks();
    renderFallback();
    if (typeof renderVoices === 'function') renderVoices();  // voice list (filter-aware)
  }

  const VW = 960, VH = 700, CX = VW/2, CY = VH/2;

  // Build node lookup
  const nodes = {};
  const addNode = (n, kind) => { nodes[n.id] = Object.assign({kind}, n); };
  data.players.forEach(p => addNode(p, 'player'));
  data.themes .forEach(t => addNode(t, 'theme'));
  data.voices .forEach(v => addNode(v, 'voice'));
  addNode(data.opportunity, 'opportunity');

  const PAD_X = 80, PAD_Y = 70;
  const SX = VW - PAD_X * 2, SY = VH - PAD_Y * 2;
  const nodeArr = Object.values(nodes);

  // Compute radius per node FIRST (needed for collision separation).
  function radiusOf(n) {
    if (n.kind === 'player') return (n.size || 22);
    if (n.kind === 'theme')  return (n.size || 16);
    if (n.kind === 'voice')  return Math.max(7, Math.min(15, Math.log10((n.score||10)+1) * 3.6));
    if (n.kind === 'opportunity') return (n.size || 28);
    return 8;
  }

  // Build incident-edges lookup (needed by the layout springs)
  const neighbors = {};
  const incidentEdges = {};
  data.edges.forEach((e, i) => {
    (neighbors[e.from] = neighbors[e.from] || new Set()).add(e.to);
    (neighbors[e.to]   = neighbors[e.to]   || new Set()).add(e.from);
    (incidentEdges[e.from] = incidentEdges[e.from] || new Set()).add(i);
    (incidentEdges[e.to]   = incidentEdges[e.to]   || new Set()).add(i);
  });

  // ---------------- Auto-layout (force-directed + collision) ----------------
  // Works for ANY data — with or without curated x/y. Prevents node overlap
  // (the bug where voices w/o coords all collapsed to center).
  //
  // Seeding:
  //   - if a node has x/y in data → use it (scaled), with tiny jitter
  //   - else → deterministic spread on a phyllotaxis spiral by index
  // Then run repulsion + edge springs + center gravity + hard collision.
  const GOLDEN = Math.PI * (3 - Math.sqrt(5));
  nodeArr.forEach((n, i) => {
    n.r = radiusOf(n);
    if (typeof n.x === 'number' && typeof n.y === 'number') {
      n.px = PAD_X + n.x * SX + (Math.random() - 0.5) * 8;
      n.py = PAD_Y + n.y * SY + (Math.random() - 0.5) * 8;
    } else {
      // phyllotaxis spiral → even, non-overlapping initial spread
      const t = i / Math.max(1, nodeArr.length);
      const rad = Math.sqrt(t) * Math.min(SX, SY) * 0.46;
      const ang = i * GOLDEN;
      n.px = VW / 2 + rad * Math.cos(ang);
      n.py = VH / 2 + rad * Math.sin(ang);
    }
    n.vx = 0; n.vy = 0;
    n.phase = Math.random() * Math.PI * 2;
    n.driftAmp = n.kind === 'voice' ? 5 : (n.kind === 'theme' ? 3 : 1.6);
  });

  // Labeled nodes (players/themes/opp) need horizontal room for their text.
  // Give them a larger effective collision radius so labels don't overlap.
  function pad(n) {
    if (n.kind === 'voice') return n.r + 10;        // no label
    // estimate label half-width (mono ~6.5px/char) but cap it
    const label = n.name || n.label || '';
    const halfLabel = Math.min(70, label.length * 3.4);
    return Math.max(n.r + 26, halfLabel);
  }

  function runForceLayout(iters) {
    const REPEL = 7000;     // node-node electrostatic repulsion (spread out)
    const SPRING = 0.05;    // edge spring stiffness
    const GRAVITY = 0.006;  // weak center pull → fills canvas
    const DAMP = 0.86;
    const VMAX = 34;
    for (let it = 0; it < iters; it++) {
      const cooling = 1 - it / iters;
      for (let a = 0; a < nodeArr.length; a++) {
        const na = nodeArr[a];
        for (let b = a + 1; b < nodeArr.length; b++) {
          const nb = nodeArr[b];
          let dx = na.px - nb.px, dy = na.py - nb.py;
          let d2 = dx*dx + dy*dy;
          if (d2 < 0.01) { dx = (Math.random()-0.5); dy = (Math.random()-0.5); d2 = dx*dx+dy*dy; }
          const d = Math.sqrt(d2);
          const f = (REPEL / d2) * cooling;
          let fx = (dx / d) * f, fy = (dy / d) * f;
          // label-aware hard collision
          const minDist = pad(na) + pad(nb);
          if (d < minDist) {
            const push = (minDist - d) * 0.5;
            fx += (dx / d) * push;
            fy += (dy / d) * push;
          }
          na.vx += fx; na.vy += fy;
          nb.vx -= fx; nb.vy -= fy;
        }
      }
      data.edges.forEach(e => {
        const a = nodes[e.from], b = nodes[e.to]; if (!a || !b) return;
        let dx = b.px - a.px, dy = b.py - a.py;
        const d = Math.sqrt(dx*dx + dy*dy) || 0.01;
        const rest = (a.kind === 'voice' || b.kind === 'voice') ? 95 : 185;
        const f = SPRING * (d - rest);
        const fx = (dx / d) * f, fy = (dy / d) * f;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      });
      nodeArr.forEach(n => {
        n.vx += (VW/2 - n.px) * GRAVITY;
        n.vy += (VH/2 - n.py) * GRAVITY;
        n.vx *= DAMP; n.vy *= DAMP;
        n.vx = Math.max(-VMAX, Math.min(VMAX, n.vx));
        n.vy = Math.max(-VMAX, Math.min(VMAX, n.vy));
        n.px += n.vx; n.py += n.vy;
        const m = 24;
        n.px = Math.max(m + n.r, Math.min(VW - m - n.r, n.px));
        n.py = Math.max(m + n.r, Math.min(VH - m - n.r, n.py));
      });
    }
  }
  runForceLayout(360);
  // Final label-aware collision relaxation (guarantees no residual overlap)
  for (let pass = 0; pass < 16; pass++) {
    for (let a = 0; a < nodeArr.length; a++) {
      for (let b = a + 1; b < nodeArr.length; b++) {
        const na = nodeArr[a], nb = nodeArr[b];
        let dx = na.px - nb.px, dy = na.py - nb.py;
        let d = Math.sqrt(dx*dx + dy*dy) || 0.01;
        const minDist = pad(na) + pad(nb);
        if (d < minDist) {
          const shift = (minDist - d) / 2;
          const ux = dx / d, uy = dy / d;
          na.px += ux * shift; na.py += uy * shift;
          nb.px -= ux * shift; nb.py -= uy * shift;
          const m = 24;
          na.px = Math.max(m, Math.min(VW - m, na.px)); na.py = Math.max(m, Math.min(VH - m, na.py));
          nb.px = Math.max(m, Math.min(VW - m, nb.px)); nb.py = Math.max(m, Math.min(VH - m, nb.py));
        }
      }
    }
  }
  // Snapshot settled positions as drift anchors
  nodeArr.forEach(n => { n.bx = n.px; n.by = n.py; });

  // ============ Demand-signal radar (replaces force-graph centerpiece) ============
  // A dark sonar scope embedded in the light report panel. Each real voice is a
  // blip; the sweep lights it as it passes. Themes = sectors, the least-discussed
  // sector is flagged as the white-space opportunity. "Widen range" grows the
  // scope and surfaces outer weak signals — the radar-expanding-its-reach gesture.
  const cv = document.getElementById('radarCanvas');
  const rctx = cv.getContext('2d');
  const RDPR = Math.min(2, window.devicePixelRatio || 1);
  let RW = 0, RH = 0, RCX = 0, RCY = 0, RR = 0;

  // Radar sectors = only themes that actually have voices, so there are no empty
  // labelled dimensions (a 0-voice theme is a cluster artifact, not a wedge).
  const rThemes = (() => {
    const pop = data.themes.filter(t => (data.voices||[]).some(v => v.themes && v.themes.includes(t.id)));
    return pop.length >= 2 ? pop : data.themes;
  })();
  const NSEC = Math.max(1, rThemes.length);
  const SECTOR = (Math.PI * 2) / NSEC;
  const secOf = {}; rThemes.forEach((t, i) => secOf[t.id] = i);
  function hashf(s){ let h = 2166136261; for (const c of (s||'')) h = ((h ^ c.charCodeAt(0)) * 16777619) >>> 0; return (h % 1000) / 1000; }

  let blips = [], ghosts = [], rangeLevel = 1, rMaxScore = 1, oppSec = 0;
  let selVoiceIds = new Set();     // mutated by applySelection() to highlight blips
  let radarPaused = false;

  function buildBlips(){
    rMaxScore = Math.max(1, ...data.voices.map(v => v.score || 1));
    // RANK-based radius: spread voices evenly from the high-upvote core (center)
    // to the long tail (rim), regardless of absolute scores.
    const N = data.voices.length;
    const order = data.voices.map(v => ({ v, s: Math.abs(v.score || 0) }))
                            .sort((a, b) => b.s - a.s);   // highest score first
    const rankOf = {};
    order.forEach((o, i) => { rankOf[o.v.id] = i; });
    // ONE blip per (voice × theme): every labelled theme wedge then contains
    // EXACTLY its own voices — no empty dimensions, and no blip lands in a wedge
    // it doesn't belong to. A multi-theme voice shows a dot in each wedge.
    blips = [];
    data.voices.forEach((v, k) => {
      const rankFrac = N > 1 ? (rankOf[v.id] / (N - 1)) : 0; // 0 = top upvotes, 1 = long tail
      const rr = 0.18 + rankFrac * 0.74;                     // even spread 0.18 → 0.92
      const themeIds = (v.themes && v.themes.length) ? v.themes : [null];
      themeIds.forEach((tid, ti) => {
        const sec = (tid != null && secOf[tid] != null) ? secOf[tid] : (k % NSEC);
        const frac = hashf(v.id + ':' + (tid != null ? tid : ti)) * 0.7 + 0.15; // angle in wedge
        const ang = sec * SECTOR + frac * SECTOR - Math.PI / 2;                  // sector 0 at top
        blips.push({ v, id: v.id, sec, ang, rr, rankFrac, lit: 0, neg: v.sentiment !== 'pos' });
      });
    });
  }
  function secCounts(){ const c = new Array(NSEC).fill(0); blips.forEach(b => c[b.sec]++); return c; }
  function pickOpp(){ const c = secCounts(); let m = 1e9; c.forEach((n, i) => { if (n < m){ m = n; oppSec = i; } }); }

  function layoutRadar(){
    const rect = cv.parentElement.getBoundingClientRect();
    RW = rect.width; RH = rect.height;
    cv.width = RW * RDPR; cv.height = RH * RDPR;
    rctx.setTransform(RDPR, 0, 0, RDPR, 0, 0);
    RCX = RW / 2; RCY = RH / 2 - 12;     // lift slightly so bottom labels clear the controls
    RR = Math.min(RW, RH) * 0.38;
  }
  function angDiff(a, b){ return Math.abs(((a - b + Math.PI) % (Math.PI*2)) - Math.PI); }
  function blipXY(b){ const rad = RR * b.rr; return { x: RCX + Math.cos(b.ang)*rad, y: RCY + Math.sin(b.ang)*rad }; }

  let sweep = 0, rLast = performance.now();
  function radarFrame(now){
    const dt = Math.min(50, now - rLast); rLast = now;
    if (!radarPaused) sweep = (sweep + dt * 0.0011) % (Math.PI*2);
    drawRadar();
    requestAnimationFrame(radarFrame);
  }
  function drawRadar(){
    if (!RW) layoutRadar();
    rctx.clearRect(0, 0, RW, RH);
    const disc = rctx.createRadialGradient(RCX, RCY, 0, RCX, RCY, RR);
    disc.addColorStop(0, '#141821'); disc.addColorStop(1, '#0e1117');
    rctx.beginPath(); rctx.arc(RCX, RCY, RR, 0, Math.PI*2); rctx.fillStyle = disc; rctx.fill();
    rctx.save(); rctx.beginPath(); rctx.arc(RCX, RCY, RR, 0, Math.PI*2); rctx.clip();

    const rings = 3 + rangeLevel;
    for (let i = 1; i <= rings; i++){
      rctx.beginPath(); rctx.arc(RCX, RCY, RR*i/rings, 0, Math.PI*2);
      rctx.strokeStyle = `rgba(38,225,154,${i===rings?0.34:0.13})`; rctx.lineWidth = 1; rctx.stroke();
    }
    for (let s = 0; s < NSEC; s++){
      const a = s*SECTOR - Math.PI/2;
      rctx.beginPath(); rctx.moveTo(RCX, RCY); rctx.lineTo(RCX+Math.cos(a)*RR, RCY+Math.sin(a)*RR);
      rctx.strokeStyle = 'rgba(38,225,154,0.09)'; rctx.lineWidth = 1; rctx.stroke();
    }
    const oa = oppSec*SECTOR - Math.PI/2;        // opportunity (white-space) wedge
    rctx.beginPath(); rctx.moveTo(RCX, RCY); rctx.arc(RCX, RCY, RR, oa, oa+SECTOR); rctx.closePath();
    const og = rctx.createRadialGradient(RCX, RCY, 0, RCX, RCY, RR);
    og.addColorStop(0,'rgba(201,161,74,0)'); og.addColorStop(1,'rgba(201,161,74,0.16)');
    rctx.fillStyle = og; rctx.fill();
    for (let k = 0; k < 26; k++){                 // sweep afterglow trail
      const a = sweep - k*0.03, alpha = 0.10*(1 - k/26);
      rctx.beginPath(); rctx.moveTo(RCX, RCY); rctx.arc(RCX, RCY, RR, a-0.04, a); rctx.closePath();
      rctx.fillStyle = `rgba(0,108,71,${alpha})`; rctx.fill();
    }
    rctx.beginPath(); rctx.moveTo(RCX, RCY);      // sweep line
    rctx.lineTo(RCX+Math.cos(sweep-Math.PI/2)*RR, RCY+Math.sin(sweep-Math.PI/2)*RR);
    rctx.strokeStyle = 'rgba(46,229,157,0.9)'; rctx.lineWidth = 2; rctx.stroke();

    // radial axis labels (radius = engagement: core high-upvote → long tail)
    rctx.font = '500 9px -apple-system,"PingFang SC",sans-serif';
    rctx.textAlign = 'left'; rctx.textBaseline = 'middle';
    rctx.fillStyle = 'rgba(46,229,157,0.55)';
    rctx.fillText(T('radar.axisCore'), RCX + 6, RCY + RR*0.16);
    rctx.fillStyle = 'rgba(46,229,157,0.40)';
    rctx.fillText(T('radar.axisTail'), RCX + 6, RCY + RR*0.90);
    rctx.restore();

    const hasSel = selVoiceIds.size > 0;
    ghosts.forEach(g => drawBlip(g, true, hasSel));
    blips.forEach(b => drawBlip(b, false, hasSel));
    rctx.beginPath(); rctx.arc(RCX, RCY, 3, 0, Math.PI*2); rctx.fillStyle = 'rgba(46,229,157,.95)'; rctx.fill();

    rctx.font = '600 11px -apple-system,"PingFang SC",sans-serif';
    rctx.textAlign = 'center'; rctx.textBaseline = 'middle';
    rThemes.forEach((t, s) => {                   // theme labels outside the disc
      const a = (s+0.5)*SECTOR - Math.PI/2;
      const lx = RCX + Math.cos(a)*(RR+20), ly = RCY + Math.sin(a)*(RR+20);
      rctx.fillStyle = s===oppSec ? 'rgba(0,108,71,.95)' : 'rgba(68,73,51,.78)';
      rctx.fillText((s===oppSec?'★ ':'') + (tf(t,'label')||''), lx, ly);
    });
  }
  function drawBlip(b, ghost, hasSel){
    const p = blipXY(b); b._x = p.x; b._y = p.y;
    const sa = sweep % (Math.PI*2), ba = (b.ang + Math.PI/2) % (Math.PI*2);
    if (angDiff(sa, ba) < 0.05) b.lit = 1;
    b.lit *= 0.975;
    const base = ghost ? 2.4 : (3 + (1 - b.rr)*4);
    const litR = base + b.lit*5;
    const dim = hasSel && !selVoiceIds.has(b.id) ? 0.28 : 1;
    const col = b.neg ? '232,131,111' : '46,229,157';
    if (b.lit > 0.05){
      rctx.beginPath(); rctx.arc(b._x, b._y, litR+6, 0, Math.PI*2);
      rctx.fillStyle = `rgba(${col},${0.18*b.lit*dim})`; rctx.fill();
    }
    rctx.beginPath(); rctx.arc(b._x, b._y, litR, 0, Math.PI*2);
    const aMin = (ghost?0.30:0.6) * dim;
    rctx.fillStyle = `rgba(${col},${aMin + b.lit*0.4*dim})`; rctx.fill();
    if (selVoiceIds.has(b.id)){
      rctx.beginPath(); rctx.arc(b._x, b._y, litR+3, 0, Math.PI*2);
      rctx.strokeStyle = `rgba(${col},.9)`; rctx.lineWidth = 1.5; rctx.stroke();
    }
  }

  // hover → tooltip (reuses tooltipFor + nodes lookup defined below)
  const rTip = document.getElementById('kgTip');
  cv.addEventListener('mousemove', (e) => {
    const r = cv.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    let hit = null, bd = 14;
    for (const b of blips.concat(ghosts)){ const d = Math.hypot(b._x-mx, b._y-my); if (d < bd){ bd = d; hit = b; } }
    if (hit){
      const v = hit.v;
      if (v.synthetic){
        rTip.innerHTML = `<div class="tt-title">弱信号 · 待二次验证</div>
          <div class="tt-meta">外圈探测 · 扩大量程捕获<span class="tt-score">↑${v.score}</span></div>`;
      } else {
        rTip.innerHTML = tooltipFor(nodes[hit.id]);
      }
      rTip.style.left = Math.min(RW-20, mx+14) + 'px';
      rTip.style.top  = Math.max(8, my-8) + 'px';
      rTip.classList.add('show');
      cv.style.cursor = 'pointer';
    } else { rTip.classList.remove('show'); cv.style.cursor = 'default'; }
  });
  cv.addEventListener('mouseleave', () => rTip.classList.remove('show'));

  // click → blip switches to that voice's theme; empty sector switches by bearing
  cv.addEventListener('click', (e) => {
    const r = cv.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    let hit = null, bd = 16;
    for (const b of blips){ const d = Math.hypot(b._x-mx, b._y-my); if (d < bd){ bd = d; hit = b; } }
    if (hit){ onNodeClick(nodes[hit.id]); return; }
    const dx = mx - RCX, dy = my - RCY;
    if (Math.hypot(dx, dy) > RR){ delete document.body.dataset.selectedId; applySelection(null); return; }
    let a = Math.atan2(dy, dx) + Math.PI/2; a = (a + Math.PI*2) % (Math.PI*2);
    const sec = Math.floor(a / SECTOR) % NSEC;
    if (sec === oppSec && data.opportunity){ onNodeClick(Object.assign({kind:'opportunity'}, data.opportunity)); return; }
    const theme = rThemes[sec];
    if (theme) onNodeClick(nodes[theme.id]);
  });

  // widen range → grow rings + surface outer weak signals
  function flashScan(html){
    const el = document.getElementById('radarScan');
    el.innerHTML = html; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2600);
  }
  // Widen range = real deeper online search via the local app backend.
  // Appends NEW real voices (no synthetic blips). Static/downloaded reports have
  // no backend → we say so honestly instead of faking data.
  let expanding = false;
  document.getElementById('radarExpand').addEventListener('click', async () => {
    if (expanding) return;
    const meta = data.meta || {};
    if (!meta.slug){ flashScan('无法定位报告(缺 slug),无法深搜'); return; }
    const btn = document.getElementById('radarExpand');
    const span = btn.querySelector('span'); const orig = span.textContent;
    expanding = true; btn.disabled = true; span.textContent = '● 深度搜索中…';
    flashScan('继续联网深搜真实信号 · 约 30–60s…');
    try {
      const seen = (data.voices || []).map(v => v.url).filter(Boolean);
      const r = await fetch('/api/expand', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ slug: meta.slug, idea: meta.idea, market: meta.target_market,
          mode: meta.mode, seen_urls: seen }) });
      if (!r.ok) throw new Error('backend');
      const res = await r.json();
      const nv = (res && res.new_voices) || [];
      if (!nv.length){ flashScan('本轮没有捕获到新的强相关信号 · 可再试一次或换措辞'); return; }
      nv.forEach(v => { data.voices.push(v); nodes[v.id] = Object.assign({ kind:'voice' }, v); });
      if (data.verdict && data.verdict.evidence_counts) data.verdict.evidence_counts.raw_voices = data.voices.length;
      buildBlips(); pickOpp();
      rangeLevel = Math.min(4, rangeLevel + 1);
      updateRadarHud();
      renderEvidenceCounter(); renderOverview(); renderVoicesScaffold(); renderVoices(); renderFallback();
      flashScan(`⊕ 深搜完成 · 新增 <b>${nv.length}</b> 条真实原声 · 现共 <b>${data.voices.length}</b> 条`);
    } catch (e) {
      flashScan('扩大量程需在本地 app 内运行(下载的静态报告无法联网深搜)');
    } finally {
      expanding = false; btn.disabled = false; span.textContent = orig;
    }
  });
  document.getElementById('radarPause').addEventListener('click', function(){
    radarPaused = !radarPaused;
    this.querySelector('span').textContent = radarPaused ? '▶ 继续' : '⏸ 暂停';
  });

  function updateRadarHud(){
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set('rhN', (data.voices||[]).length + ghosts.length); set('rhSec', NSEC); set('rhRange', rangeLevel);
    const conf = document.getElementById('rhConf');
    if (conf) conf.textContent = rangeLevel<=1 ? T('radar.core') : (rangeLevel<=2 ? T('radar.ext') : T('radar.outer'));
  }

  buildBlips(); pickOpp(); layoutRadar(); updateRadarHud();
  if (window.ResizeObserver){ new ResizeObserver(() => layoutRadar()).observe(cv.parentElement); }
  window.addEventListener('resize', layoutRadar);
  requestAnimationFrame(radarFrame);

  // (zoom/pan/drift loop removed — the radar canvas owns its own animation)

  // ---------------- Hover ----------------
  const tipEl = document.getElementById('kgTip');
  const centerPanel = document.querySelector('.center-panel');

  function tooltipFor(n) {
    if (n.kind === 'voice') {
      const sent = n.sentiment === 'pos' ? '正面' : '负面';
      const player = (nodes[n.player] && nodes[n.player].name) || n.player;
      const theme = n.themes.map(t => (nodes[t] && nodes[t].label) || t).join(' · ');
      return `<div class="tt-title">${esc(n.title || '')}</div>${zhLine(n)}
              <div class="tt-meta">${sent} · ${player} · ${theme}<span class="tt-score">↑${n.score.toLocaleString()}</span></div>
              <div class="tt-hint">点击 → 切到「用户声音」并锁定该主题</div>`;
    }
    if (n.kind === 'player') {
      const voiceCount = (incidentEdges[n.id] || new Set()).size;
      return `<div class="tt-title">${n.name}</div>
              <div class="tt-meta">玩家 · 关联 ${voiceCount} 个主题/原话</div>
              <div class="tt-hint">点击 → 看该玩家档案</div>`;
    }
    if (n.kind === 'theme') {
      const voiceCount = data.voices.filter(v => v.themes.includes(n.id)).length;
      return `<div class="tt-title">${n.label}</div>
              <div class="tt-meta">主题 · ${voiceCount} 条原话讨论</div>
              <div class="tt-hint">点击 → 看该主题下的所有用户声音</div>`;
    }
    if (n.kind === 'opportunity') {
      return `<div class="tt-title">${n.label}</div>
              <div class="tt-meta">机会缝隙 · 无玩家占据</div>
              <div class="tt-hint">点击 → 看完整机会分析</div>`;
    }
    return '';
  }

  // Compute which voices a non-voice node "owns" semantically (not just 1-hop).
  // Player → all voices where voice.player == player.id
  // Theme  → all voices where voice.themes includes theme.id
  // Voice  → no related voices (it IS the voice)
  // Opp    → voices connected to themes that are connected to opp (rare)
  function relatedVoicesFor(n) {
    if (n.kind === 'player') return data.voices.filter(v => v.player === n.id).map(v => v.id);
    if (n.kind === 'theme')  return data.voices.filter(v => v.themes.includes(n.id)).map(v => v.id);
    if (n.kind === 'opportunity') {
      const oppThemes = Array.from(neighbors[n.id] || []);
      return data.voices.filter(v => v.themes.some(t => oppThemes.includes(t))).map(v => v.id);
    }
    return [];
  }

  // Selection — drives radar blip highlight (selVoiceIds) + the selection strip
  function applySelection(id) {
    selVoiceIds = new Set();
    const sl = document.getElementById('selLabel');
    if (!id) { if (sl) sl.textContent = '—'; return; }
    const node = nodes[id];
    if (node) {
      if (node.kind === 'voice') selVoiceIds.add(id);
      else (relatedVoicesFor(node) || []).forEach(vid => selVoiceIds.add(vid));
      const label = tf(node, 'name') || tf(node, 'label') || node.title || id;
      if (sl) sl.textContent = `${node.kind} · ${label}`;
    }
  }

  function onNodeClick(node) {
    const lensFor = { player:'players', theme:'voices', voice:'voices', opportunity:'opportunity' };
    const lens = lensFor[node.kind];
    if (!lens) return;
    document.body.dataset.lens = lens;
    document.body.dataset.selectedId = node.id;
    syncTabs();
    applySelection(node.id);
    if (document.body.dataset.view === 'graph') document.body.dataset.view = 'split';
    if (lens === 'voices') filterVoicesBySelection(node);
  }

  // Lens tabs
  function syncTabs() {
    const cur = document.body.dataset.lens;
    document.querySelectorAll('.lens-tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.lens === cur);
    });
  }
  // Lens tabs — event delegation (survives re-render)
  document.querySelector('.lens-tabs').addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-lens]'); if (!btn) return;
    document.body.dataset.lens = btn.dataset.lens;
    delete document.body.dataset.selectedId;
    applySelection(null);
    syncTabs();
    resetVoiceFilter();
  });

  // View switcher
  document.querySelector('.view-switcher').addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-view]'); if (!btn) return;
    document.body.dataset.view = btn.dataset.view;
  });

  // Player chips — delegate on the lens container (re-rendered on lang switch)
  document.getElementById('lensPlayers').addEventListener('click', (ev) => {
    const chip = ev.target.closest('.chip[data-player-id]'); if (!chip) return;
    const pid = chip.dataset.playerId;
    document.body.dataset.selectedId = pid;
    applySelection(pid);
  });

  // Clear selection (static element)
  document.getElementById('clearSel').addEventListener('click', () => {
    delete document.body.dataset.selectedId;
    applySelection(null);
    resetVoiceFilter();
  });

  // ============ Voices lens ============
  const voiceList = () => document.getElementById('voiceList');
  function renderVoices(filterFn) {
    const list = voiceList(); if (!list) return;
    list.innerHTML = '';
    let n = 0;
    data.voices.forEach(v => {
      if (filterFn && !filterFn(v)) return;
      n++;
      const row = document.createElement('div');
      row.className = 'voice-row ' + v.sentiment;
      const themeLabels = v.themes.map(themeLabel).join(' · ');
      row.innerHTML = `
        <span class="dot">●</span>
        <div>
          <div class="vt"><a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(tf(v,'title'))}</a></div>${zhLine(v)}
          <div class="vm">${esc(playerName(v.player))} · ${esc(themeLabels)}</div>
        </div>
        <span class="vs">↑${fmtNum(Math.abs(v.score))}</span>
      `;
      list.appendChild(row);
    });
    const ctx = document.getElementById('voiceContext');
    if (ctx) ctx.textContent = `${n} ${T('vo.count')} ${data.voices.length}${T('vo.count2')}`;
  }

  // Filter chips
  const filterState = { sent: 'all', theme: 'all' };
  function applyVoiceFilter() {
    renderVoices(v => {
      if (filterState.sent !== 'all' && v.sentiment !== filterState.sent) return false;
      if (filterState.theme !== 'all' && !v.themes.includes(filterState.theme)) return false;
      return true;
    });
  }
  // delegate on the filter bar (re-rendered on lang switch)
  document.getElementById('voiceFilter').addEventListener('click', (ev) => {
    const chip = ev.target.closest('.chip[data-filter]'); if (!chip) return;
    const group = chip.dataset.filter, val = chip.dataset.val;
    filterState[group] = val;
    document.querySelectorAll(`#voiceFilter .chip[data-filter="${group}"]`).forEach(c =>
      c.classList.toggle('active', c.dataset.val === val));
    applyVoiceFilter();
  });
  function resetVoiceFilter() {
    filterState.sent = 'all'; filterState.theme = 'all';
    document.querySelectorAll('#voiceFilter .chip').forEach(c => c.classList.toggle('active', c.dataset.val === 'all'));
    renderVoices();
  }

  // When a theme node is clicked → pre-filter voices to that theme
  function filterVoicesBySelection(node) {
    if (node.kind === 'theme') {
      filterState.theme = node.id;
      document.querySelectorAll('#voiceFilter .chip[data-filter="theme"]').forEach(c =>
        c.classList.toggle('active', c.dataset.val === node.id));
      applyVoiceFilter();
    } else if (node.kind === 'voice') {
      // single-voice: highlight only that voice's themes via theme filter
      const t = node.themes[0];
      filterState.theme = t;
      document.querySelectorAll('#voiceFilter .chip[data-filter="theme"]').forEach(c =>
        c.classList.toggle('active', c.dataset.val === t));
      applyVoiceFilter();
    } else {
      resetVoiceFilter();
    }
  }

  // ============ Export menu (PDF · Markdown report · all voices) ============
  function downloadText(name, text, mime){
    const blob = new Blob([text], { type: (mime||'text/markdown') + ';charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
  }
  const _slug = (data.meta && data.meta.slug) || 'report';
  const _mdClean = s => String(s == null ? '' : s).replace(/\r?\n+/g, ' ').replace(/\|/g, '/').trim();
  const _arrL = (o, f) => { if (!o) return []; const l = LANG();
    if (l !== 'zh') { const k = o[f+'_'+l]; if (Array.isArray(k)) return k; const e = o[f+'_en']; if (Array.isArray(e)) return e; }
    return Array.isArray(o[f]) ? o[f] : []; };

  // text-only Markdown of the whole report — charts re-expressed as tables/lists
  function buildReportMarkdown(){
    const zh = LANG() === 'zh', L = (a,b) => zh ? a : b;
    const m = data.meta || {}, v = data.verdict || {};
    const allV = data.voices || [], N = allV.length || 1;
    const pct = n => Math.round(n / N * 100);
    const posV = allV.filter(x => x.sentiment === 'pos').sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    const negV = allV.filter(x => x.sentiment !== 'pos').sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    const commMap = {}; allV.forEach(x => { const s = subOf(x.url); commMap[s] = (commMap[s]||0)+1; });
    const comms = Object.entries(commMap).sort((a,b)=>b[1]-a[1]);
    const themeCounts = (data.themes||[]).map(t => ({ t, n: allV.filter(x=>x.themes.includes(t.id)).length }))
                          .filter(x => x.n > 0).sort((a,b)=>b.n-a.n);
    const players = (data.players||[]).map(p => { const pv = allV.filter(x=>x.player===p.id);
        const pos = pv.filter(x=>x.sentiment==='pos').length; return { p, n: pv.length, pos, neg: pv.length-pos }; })
        .sort((a,b)=>b.n-a.n);
    const main = players.filter(s=>s.n>0), more = players.filter(s=>s.n===0);
    const heard = Math.max(1, main.reduce((a,s)=>a+s.n,0));
    const UD = data.user_demand || {};
    const o = [], P = s => o.push(s);
    const sec = (label, body) => { P(`\n## ${label}`); if (body) P(_mdClean(body)); };

    P(`# ${_mdClean(tf(m,'thesis') || tf(m,'idea'))}`);
    if (tf(m,'deck')) P(`\n${_mdClean(tf(m,'deck'))}`);
    P(`\n> ${_mdClean(tf(m,'idea'))} · ${_mdClean(m.timestamp)} · ${_mdClean(m.target_market||'')}`);
    P(`\n**${L('采集真实原声','Real voices')}**: ${allV.length} · **${L('社区','Communities')}**: ${comms.length} · **${L('玩家','Players')}**: ${(data.players||[]).length} · **${L('情绪','Sentiment')}**: ${sentLabel('pos')} ${pct(posV.length)}% / ${sentLabel('neg')} ${100-pct(posV.length)}%`);

    sec(L('核心发现','Key findings'), tf(v,'rationale'));
    _arrL(v,'key_findings').forEach(k => P(`- ${_mdClean(k)}`));

    const SI = data.section_insights || {};
    sec(`§1 ${L('市场与品类洞察','Market & category')}`, tf(SI,'market'));
    P(`\n### ${L('需求主题分布','Theme distribution')}`);
    P(`| ${L('主题','Theme')} | ${L('占比','Share')} | ${L('条数','Count')} |`);
    P(`|---|---:|---:|`);
    themeCounts.forEach(({t,n}) => P(`| ${_mdClean(tf(t,'label'))} | ${pct(n)}% | ${n} |`));

    sec(`§2 ${L('用户声音洞察','User voice')}`, tf(SI,'user'));
    P(`\n### ${L('主题 × 情绪','Theme × sentiment')}`);
    P(`| ${L('主题','Theme')} | ${sentLabel('pos')} | ${sentLabel('neg')} |`);
    P(`|---|---:|---:|`);
    themeCounts.forEach(({t}) => { const tv = allV.filter(x=>x.themes.includes(t.id));
      const pos = tv.filter(x=>x.sentiment==='pos').length; P(`| ${_mdClean(tf(t,'label'))} | ${pos} | ${tv.length-pos} |`); });
    const quoteLines = (arr,label) => { P(`\n### ${label} · Top 5`);
      arr.slice(0,5).forEach((x,i)=>{ const sub=voiceZh(x); P(`${i+1}. "${_mdClean(tf(x,'title'))}"${sub?` — ${_mdClean(sub)}`:''}`);
        P(`   ${subOf(x.url)} · ↑${fmtNum(Math.abs(x.score))} · ${x.url}`); }); };
    quoteLines(posV, isNonStock()?L('真实需求信号','Demand signals'):L('好评','Praise'));
    quoteLines(negV, isNonStock()?L('缺口/不满','Gaps'):L('差评','Complaints'));

    if (tf(UD,'jtbd') || (UD.scenarios||[]).length){
      sec(`§3 ${L('用户与需求拆解','User & demand')}`, tf(SI,'user'));
      if (tf(UD,'jtbd')) P(`\n**JTBD**: ${_mdClean(tf(UD,'jtbd'))}`);
      const scen=(UD.scenarios||[]).slice().sort((a,b)=>(b.share||0)-(a.share||0)).slice(0,5);
      if (scen.length){ P(`\n### ${L('使用场景','Scenarios')}`); scen.forEach((s,i)=>P(`${i+1}. **${_mdClean(tf(s,'name'))}**${s.share!=null?` — ${s.share}%`:''} — ${_mdClean(tf(s,'summary'))}`)); }
      const grp=(arr,nameK,title)=>{ if(!(arr||[]).length) return; P(`\n### ${title}`); arr.slice(0,5).forEach((x,i)=>P(`${i+1}. **${_mdClean(tf(x,nameK))}** — ${_mdClean(tf(x,'summary'))}`)); };
      grp(UD.personas,'name',L('目标人群','Personas'));
      grp(UD.unmet_needs,'need',L('未满足需求','Unmet needs'));
      grp(UD.workarounds,'approach',L('替代方案','Workarounds'));
      if (tf(UD,'wtp')) P(`\n**${L('付费意愿','Willingness to pay')}**: ${_mdClean(tf(UD,'wtp'))}`);
    }

    sec(`§4 ${L('竞品全景','Competitive')}`, tf(SI,'competitive'));
    P(`\n### ${L('玩家对比','Brand comparison')}`);
    P(`| ${L('玩家','Brand')} | ${L('声量占比','Share')} | ${L('口碑(好/差)','Sentiment')} | ${L('价格/状态','Price/status')} |`);
    P(`|---|---:|---|---|`);
    main.forEach(s => { const tot=s.pos+s.neg, posR=tot?Math.round(s.pos/tot*100):0;
      const sent = tot>=10 ? `${posR}% / ${100-posR}%` : L(`信息量过少(${tot}条)`,`too few (${tot})`);
      P(`| ${_mdClean(tf(s.p,'name'))} | ${Math.round(s.n/heard*100)}% (${s.n}) | ${sent} | ${_mdClean(s.p.price||'—')}${s.p.status?` · ${s.p.status}`:''} |`); });
    if (more.length) P(`\n${L('更多玩家(本次未采集到讨论)','More players (no discussion captured)')}: ${more.map(s=>_mdClean(tf(s.p,'name'))).join(' · ')}`);

    P(`\n## §5 ${L('最受关注的主题 · Top 3','Top themes · Top 3')}`);
    themeCounts.slice(0,3).forEach(({t,n},i) => { const tv = allV.filter(x=>x.themes.includes(t.id)).sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
      const pos = tv.filter(x=>x.sentiment==='pos').length;
      P(`\n**${i+1}. ${_mdClean(tf(t,'label'))}** — ${pct(n)}% ${L('被讨论','discussed')} · ${tv.length?Math.round(pos/tv.length*100):0}% ${sentLabel('pos')}`);
      tv.slice(0,3).forEach(x => P(`   - "${_mdClean(tf(x,'title'))}" (${subOf(x.url)} · ↑${fmtNum(Math.abs(x.score))}) ${x.url}`)); });

    sec(`§6 ${L('机会缝隙','Opportunity')}`, tf(SI,'opportunity'));
    const opp = data.opportunity || {};
    if (tf(opp,'label')) P(`\n**${_mdClean(tf(opp,'label'))}** — ${_mdClean(tf(opp,'summary'))}`);
    if ((data.paths||[]).length){ P(`\n### ${L('切入方向(供参考,非定论)','Entry directions (advisory)')}`);
      data.paths.forEach(p => { P(`\n- **${_mdClean(tf(p,'label'))}** — ${_mdClean(tf(p,'core'))}`);
        if (tf(p,'hypothesis')) P(`  - ${L('假设','Bet')}: ${_mdClean(tf(p,'hypothesis'))}`);
        if (tf(p,'evidence'))   P(`  - ${L('证据','Evidence')}: ${_mdClean(tf(p,'evidence'))}`);
        _arrL(p,'open_questions').forEach(q => P(`  - ${L('待解','Open')}: ${_mdClean(q)}`));
        if (tf(p,'risk'))       P(`  - ${L('风险','Risk')}: ${_mdClean(tf(p,'risk'))}`); }); }

    if ((data.risks||[]).length){ sec(`§7 ${L('风险与挑战','Risks')}`, tf(SI,'risk'));
      data.risks.forEach(r => P(`- [${r.severity}] **${_mdClean(tf(r,'title'))}** — ${_mdClean(tf(r,'scenario'))} → ${_mdClean(tf(r,'mitigation'))}`)); }

    const tr = data.trend || [];
    if (tr.length){ P(`\n## ${L('讨论热度趋势(真实原声·按发帖年份)','Discussion trend (voices by year)')}`);
      P(`| ${L('年份','Year')} | ${L('条数','Count')} |`); P(`|---|---:|`);
      tr.forEach(t => P(`| ${t.period} | ${t.count!=null?t.count:(t.value||0)} |`)); }

    P(`\n## ${L('方法与数据来源','Methodology')}`);
    P(L('数据来自 Reddit(Arctic Shift + pullpush 归档)与 Hacker News 的真实公开讨论。','Real public discussion from Reddit (Arctic Shift + pullpush) and Hacker News.'));
    P(`${L('覆盖社区','Communities')}: ${comms.slice(0,12).map(c=>`${c[0]} (${c[1]})`).join(' · ') || '—'}`);
    P(`\n— ${L('完整原文请见','Full voices')}: ${_slug}-voices.md · ${L('全部原声','total')} ${allV.length}`);
    return o.join('\n') + '\n';
  }

  // every collected voice → a plain Markdown list (the raw evidence dump)
  function buildVoicesMarkdown(){
    const zh = LANG() === 'zh', L = (a,b)=>zh?a:b;
    const allV = [...(data.voices||[])].sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    const o = [];
    o.push(`# ${_mdClean(tf(data.meta,'idea'))} · ${L('全部真实原声','All real voices')} (${allV.length})`);
    o.push(`> ${_mdClean((data.meta||{}).timestamp)} · ${L('按赞数排序','ranked by upvotes')}\n`);
    allV.forEach((x,i) => {
      o.push(`${i+1}. **[${sentLabel(x.sentiment==='pos'?'pos':'neg')}]** "${_mdClean(tf(x,'title'))}"`);
      const sub = voiceZh(x); if (sub) o.push(`   - ${_mdClean(sub)}`);
      o.push(`   - ${subOf(x.url)} · ↑${fmtNum(Math.abs(x.score))} · ${x.url}`);
    });
    return o.join('\n') + '\n';
  }

  function runExport(act){
    if (act === 'pdf') { window.print(); return; }
    const lang = LANG();
    if (act === 'md')     downloadText(`${_slug}-report-${lang}.md`, buildReportMarkdown());
    if (act === 'voices') downloadText(`${_slug}-voices-${lang}.md`, buildVoicesMarkdown());
  }
  const _exBtn = document.getElementById('exportBtn');
  const _exMenu = document.getElementById('exportMenu');
  const _exToggle = open => { const show = open == null ? _exMenu.hidden : open;
    _exMenu.hidden = !show; _exBtn.setAttribute('aria-expanded', String(show)); };
  _exBtn.addEventListener('click', e => { e.stopPropagation(); _exToggle(); });
  _exMenu.addEventListener('click', e => { const it = e.target.closest('.export-item'); if (!it) return;
    runExport(it.dataset.act); _exToggle(false); });
  document.addEventListener('click', e => { if (!e.target.closest('#exportWrap')) _exToggle(false); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') _exToggle(false); });

  // ============ Language switcher (multi-language) ============
  // Base content is zh; the pipeline always backfills en, and optionally the
  // generation target language (meta.target_lang) into <field>_<code>. The report
  // can display in any language that's present.
  const LANG_LABEL = { zh:'中文', en:'English', ja:'日本語', es:'Español', fr:'Français', de:'Deutsch' };
  function availableLangs(){
    const out = ['zh', 'en'];
    const tl = (data.meta && data.meta.target_lang) || 'zh';
    if (tl && !out.includes(tl)) out.push(tl);
    return out;
  }
  function switchLang(code){
    document.body.dataset.lang = code;
    renderAll();              // re-render everything in the new language
    updateRadarHud();         // radar redraws theme labels every frame via tf()
    applySelection(document.body.dataset.selectedId || null);  // keep blip highlight
  }
  // set the initial language (from meta.target_lang) BEFORE building the switcher
  // so the slider/dropdown reflects it; tf() falls back to en/base if untranslated.
  document.body.dataset.lang = (data.meta && data.meta.target_lang) || 'zh';
  (function initLangSwitcher(){
    const langs = availableLangs();
    const slider = document.getElementById('langToggle');
    if (!slider) return;
    if (langs.length <= 2){   // common case: CN | EN sliding toggle
      slider.addEventListener('click', () => switchLang(LANG() === 'zh' ? 'en' : 'zh'));
      return;
    }
    // 3+ languages → swap the slider for a compact dropdown
    const sel = document.createElement('select');
    sel.id = 'langSelect'; sel.className = 'lang-select';
    sel.innerHTML = langs.map(c => `<option value="${c}">${LANG_LABEL[c] || c}</option>`).join('');
    sel.value = LANG();
    sel.addEventListener('change', () => switchLang(sel.value));
    slider.replaceWith(sel);
  })();

  // ============ Initial render ============
  // (initial language already set above, before the switcher was built)
  renderAll();
  syncTabs();

  // ---- mobile scroll cue: tap to jump to the full report; fades once scrolling ----
  (function(){
    const cue = document.getElementById('scrollCue');
    if (!cue) return;
    cue.addEventListener('click', () => {
      const t = document.querySelector('.report-divider') || document.getElementById('fbFooter');
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
      cue.classList.add('hide');
    });
    const onScroll = () => { if (window.scrollY > 60) { cue.classList.add('hide'); window.removeEventListener('scroll', onScroll); } };
    window.addEventListener('scroll', onScroll, { passive: true });
  })();

  // ============ URL Deeplink + browser history ============
  // Public state lives on body[data-*]. Keep URL hash in sync both ways.
  // Format:  #lens=players&id=oura&view=split
  //
  // Rules:
  //   - body → hash:  one MutationObserver covers every data-* change.
  //   - hash → body:  on hashchange (back/forward + manual edit) restore state.
  //   - load:         apply hash if present.
  //   - history:      pushState on every state change so back button works.

  const STATE_KEYS = ['lens', 'view', 'selectedId'];

  function readBodyState() {
    const s = {};
    for (const k of STATE_KEYS) {
      if (document.body.dataset[k] != null) s[k] = document.body.dataset[k];
    }
    return s;
  }

  function stateToHash(s) {
    const parts = [];
    if (s.lens && s.lens !== 'overview') parts.push('lens=' + encodeURIComponent(s.lens));
    if (s.selectedId)                    parts.push('id='   + encodeURIComponent(s.selectedId));
    if (s.view && s.view !== 'split')    parts.push('view=' + encodeURIComponent(s.view));
    return parts.length ? '#' + parts.join('&') : '';
  }

  function hashToState() {
    const h = window.location.hash.replace(/^#/, '');
    if (!h) return { lens: 'overview', view: 'split' };
    const s = {};
    for (const pair of h.split('&')) {
      const [k, v] = pair.split('=');
      if (!k) continue;
      const dec = decodeURIComponent(v || '');
      if (k === 'lens')  s.lens  = dec;
      if (k === 'id')    s.selectedId = dec;
      if (k === 'view')  s.view  = dec;
    }
    if (!s.lens) s.lens = 'overview';
    if (!s.view) s.view = 'split';
    return s;
  }

  function applyState(s) {
    // Validate lens
    const validLenses = ['overview','voices','players','opportunity','strategy','risks'];
    if (!validLenses.includes(s.lens)) s.lens = 'overview';
    // Validate view
    const validViews = ['graph','split','lens'];
    if (!validViews.includes(s.view)) s.view = 'split';
    // Validate selectedId
    const validIds = new Set([...data.players, ...data.themes, ...data.voices].map(n => n.id));
    if (data.opportunity) validIds.add(data.opportunity.id);
    if (s.selectedId && !validIds.has(s.selectedId)) delete s.selectedId;

    // Apply
    document.body.dataset.lens = s.lens;
    document.body.dataset.view = s.view;
    if (s.selectedId) document.body.dataset.selectedId = s.selectedId;
    else              delete document.body.dataset.selectedId;
    syncTabs();
    applySelection(s.selectedId || null);
  }

  // Body → URL (debounced + skip when our own popstate triggered it)
  let suppressHashUpdate = false;
  let hashUpdateTimer = null;
  const observer = new MutationObserver(() => {
    if (suppressHashUpdate) return;
    clearTimeout(hashUpdateTimer);
    hashUpdateTimer = setTimeout(() => {
      const newHash = stateToHash(readBodyState());
      const currentHash = window.location.hash;
      if (newHash !== currentHash && newHash !== '' || (newHash === '' && currentHash !== '')) {
        const url = newHash || window.location.pathname + window.location.search;
        history.pushState({ s: readBodyState() }, '', url);
      }
    }, 80);
  });
  observer.observe(document.body, {
    attributes: true,
    attributeFilter: STATE_KEYS.map(k => 'data-' + k.replace(/([A-Z])/g, '-$1').toLowerCase()),
  });

  // URL → body
  window.addEventListener('popstate', () => {
    suppressHashUpdate = true;
    applyState(hashToState());
    setTimeout(() => { suppressHashUpdate = false; }, 30);
  });

  window.addEventListener('hashchange', () => {
    // Only react if hash change wasn't from our own pushState
    if (suppressHashUpdate) return;
    suppressHashUpdate = true;
    applyState(hashToState());
    setTimeout(() => { suppressHashUpdate = false; }, 30);
  });

  // Initial load: apply hash if present (overrides default body state)
  if (window.location.hash) {
    suppressHashUpdate = true;
    applyState(hashToState());
    setTimeout(() => { suppressHashUpdate = false; }, 30);
  }
})();
</script>
</body>
</html>
